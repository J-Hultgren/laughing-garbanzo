function pmts(bal,apr,pay){
  if(bal<=0)return 0;if(pay<=0)return Infinity;
  if(apr===0)return Math.ceil(bal/pay);
  const r=apr/100/12;if(pay<=bal*r)return Infinity;
  return Math.ceil(Math.log(pay/(pay-bal*r))/Math.log(1+r));
}
function plbl(m){
  if(!isFinite(m)||m>600)return"Never at this rate";
  const d=new Date();d.setMonth(d.getMonth()+m);
  return d.toLocaleDateString("en-US",{month:"short",year:"numeric"});
}

function doExport(cats,budgets,actuals,goals,assets,totDebt,mo,yr,notes){
  const r=[[`My Budget Planner — ${MO[mo]} ${yr}`],[""],
    ["BUDGET"],["Category","Group","Planned","Actual","Difference"]];
  Object.entries(GRP).forEach(([gid,g])=>cats.filter(c=>c.g===gid).forEach(c=>{
    const b=budgets[c.id]||0,a=actuals[c.id]||0;r.push([c.lbl,g.lbl,b,a,a-b]);
  }));
  if(goals.length){
    r.push([""],["SAVINGS GOALS"],["Goal","Target","Saved","Monthly","% Complete"]);
    goals.forEach(g=>r.push([g.name,g.target,g.saved,g.monthly,Math.round(g.saved/g.target*100)+"%"]));
  }
  r.push([""],["NET WORTH"],["Item","Value"]);
  assets.forEach(a=>r.push([a.name,a.val]));
  const totA=assets.reduce((s,a)=>s+a.val,0);
  r.push(["Total Debts (Liabilities)",-totDebt],["NET WORTH",totA-totDebt]);
  if(notes)r.push([""],["MONTHLY NOTES"],[notes]);
  const csv=r.map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`budget-${yr}-${String(mo+1).padStart(2,"0")}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// ── Zillow Zestimate lookup ───────────────────────────────────────
async function fetchZillowEstimate(address){
  try{
    const zUrl=`https://www.zillow.com/homes/${encodeURIComponent(address.trim())}_rb/`;
    const proxy=`https://api.allorigins.win/raw?url=${encodeURIComponent(zUrl)}`;
    const resp=await fetch(proxy,{signal:AbortSignal.timeout(9000)});
    if(!resp.ok)return null;
    const html=await resp.text();
    const m=html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
    if(m){
      const str=JSON.stringify(JSON.parse(m[1]));
      for(const pat of[/"zestimate":(\d{5,})/,/"homeEstimate":(\d{5,})/,/"price":(\d{5,})/]){
        const found=str.match(pat);
        if(found){const v=parseInt(found[1]);if(v>50000&&v<20000000)return v;}
      }
    }
    return null;
  }catch(e){return null;}
}

      setDpays(pR?.budgets?.p||{});

  function onAddAcc(){
    const id="acc"+Date.now();
    const col=ACC_COLS[Object.keys(accs).length%ACC_COLS.length];
    const a={...accs,[id]:{name:"New Account",bal:0,col,type:"checking"}};
    setAccs(a);sA(a);
  }
  function onDelAcc(k){
    if(!confirm("Remove this account?"))return;
    const{[k]:_,...rest}=accs;
    setAccs(rest);sA(rest);
  }
  function onGoalEdit(g){const ng=goals.map(x=>x.id===g.id?g:x);setGoals(ng);sGoals(ng);}
  function onGoalDel(id){const ng=goals.filter(x=>x.id!==id);setGoals(ng);sGoals(ng);}
  function onGoalAdd(g){const ng=[...goals,g];setGoals(ng);sGoals(ng);}
  function onAssetVal(id,v){const as=assets.map(a=>a.id===id?{...a,val:parseFloat(v)||0}:a);setAssets(as);sAssets(as);}
  function onAssetName(id,v){const as=assets.map(a=>a.id===id?{...a,name:v}:a);setAssets(as);sAssets(as);}
  function onAssetUpdate(id,ch){const as=assets.map(a=>a.id===id?{...a,...ch}:a);setAssets(as);sAssets(as);}
  function onAddAsset(type="other"){
    const t=ASSET_TYPES[type]||ASSET_TYPES.other;
    const as=[...assets,{id:"a"+Date.now(),name:t.lbl,val:0,ico:t.ico,type,address:""}];
    setAssets(as);sAssets(as);
  }
  function onDelAsset(id){const as=assets.filter(a=>a.id!==id);setAssets(as);sAssets(as);}
  function saveNwSnap(nw){
    const h=[...nwHist.filter(h=>!(h.mo===mo&&h.yr===yr)),{mo,yr,nw}]
      .sort((a,b)=>a.yr!==b.yr?a.yr-b.yr:a.mo-b.mo).slice(-12);
    setNwHist(h);sNwHist(h);
  }
  function toggleDark(){const d=!dark;setDark(d);localStorage.setItem("budDark",d?"1":"0");}
  function onName(v){setUserName(v);localStorage.setItem("budName",v);}
  function onNotes(v){setNotes(v);sNotes(v);}

  const totInc=useMemo(()=>cats.filter(c=>c.inc).reduce((s,c)=>s+(budgets[c.id]||0),0),[cats,budgets]);
  const totBud=useMemo(()=>cats.filter(c=>!c.inc).reduce((s,c)=>s+(budgets[c.id]||0),0),[cats,budgets]);
  const totAct=useMemo(()=>cats.filter(c=>!c.inc).reduce((s,c)=>s+(actuals[c.id]||0),0),[cats,actuals]);
  const totDebt=useMemo(()=>debts.reduce((s,d)=>s+d.bal,0),[debts]);
  const totBal=useMemo(()=>Object.values(accs).reduce((s,a)=>s+(a.bal||0),0),[accs]);
  const totAssets=useMemo(()=>assets.reduce((s,a)=>s+a.val,0),[assets]);
  const netWorth=totAssets-totDebt;

  const sl={idle:"",saving:"Saving…",saved:"✓ Synced",error:"⚠ Error"}[sync];
  const sc={idle:"transparent",saving:T.blush,saved:T.sage,error:T.danger}[sync];
  const NAV=[{id:"dash",lbl:"Overview",ico:"📊"},{id:"bud",lbl:"Budget",ico:"📋"},{id:"debt",lbl:"Debts",ico:"💳"},{id:"goals",lbl:"Goals",ico:"🎯"},{id:"more",lbl:"More",ico:"⚙️"}];

  const P={T,cats,budgets,actuals,debts,dpays,accs,assets,goals,notes,nwHist,
    totInc,totBud,totAct,totDebt,totBal,totAssets,netWorth,mo,yr,dark,
    userName,onName,
    onB,onA,onCatLbl,onCatIco,onCatRec,onCatDel,onCatAdd,
    onDE,onDD,onPay,newPay,setNewPay,editD,setEditD,showAddD,setShowAddD,ndf,setNdf,onAddDebt,
    onAcc,onAddAcc,onDelAcc,onGoalEdit,onGoalDel,onGoalAdd,onAssetVal,onAssetName,onAssetUpdate,onAddAsset,onDelAsset,
    saveNwSnap,toggleDark,onNotes,isShared:IS_SHARED,
    doExp:()=>doExport(cats,budgets,actuals,goals,assets,totDebt,mo,yr,notes)};

  return(
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:"'Lato',sans-serif",color:T.text,overflowX:"hidden",paddingBottom:88,transition:"background .3s,color .3s"}}>
      <div style={{position:"fixed",top:-80,right:-80,width:280,height:280,borderRadius:"60% 40% 70% 30%/50% 60% 40% 50%",background:`radial-gradient(circle,${dark?"rgba(180,110,60,.1)":"rgba(222,188,181,.28)"} 0%,transparent 70%)`,pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",bottom:-60,left:-60,width:250,height:250,borderRadius:"40% 60% 30% 70%/60% 40% 50% 50%",background:`radial-gradient(circle,${dark?"rgba(70,110,80,.1)":"rgba(181,196,177,.22)"} 0%,transparent 70%)`,pointerEvents:"none",zIndex:0}}/>

      {IS_SHARED&&<div style={{background:`${T.blush}22`,borderBottom:`1px solid ${T.blush}30`,padding:"8px 16px",textAlign:"center",fontSize:12,color:T.blush,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>👁 View Only — Partner Dashboard</div>}

      <div style={{position:"sticky",top:IS_SHARED?33:0,zIndex:20,background:T.hdr,backdropFilter:"blur(14px)",borderBottom:`1px solid ${T.div}`,padding:"11px 17px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:700,color:T.text}}>My Budget</div>
          <div style={{fontSize:10,color:T.lt,letterSpacing:"0.12em",textTransform:"uppercase"}}>{MO[mo]} {yr}</div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {!IS_SHARED&&<>
            <button onClick={()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}} style={{background:`${T.blush}18`,border:`1px solid ${T.blush}28`,borderRadius:8,padding:"4px 10px",fontSize:15,color:T.blush,cursor:"pointer"}}>‹</button>
            <button onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}} style={{background:`${T.blush}18`,border:`1px solid ${T.blush}28`,borderRadius:8,padding:"4px 10px",fontSize:15,color:T.blush,cursor:"pointer"}}>›</button>
          </>}
          <div style={{fontSize:11,color:sc,minWidth:64,textAlign:"right"}}>{sl}</div>
        </div>
      </div>

      <div style={{maxWidth:520,margin:"0 auto",padding:"14px 14px 0",position:"relative",zIndex:1}}>
        {loading
          ?<div style={{textAlign:"center",padding:60,color:T.lt,fontFamily:"'Cormorant Garamond',serif",fontSize:26}}>Loading…</div>
          :page==="dash"  ?<Dash  {...P}/>
          :page==="bud"   ?<Bud   {...P}/>
          :page==="debt"  ?<Dbt   {...P}/>
          :page==="goals" ?<Goals {...P}/>
          :<More {...P}/>
        }
      </div>

      {!IS_SHARED&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:20,background:T.nav,backdropFilter:"blur(14px)",borderTop:`1px solid ${T.div}`,display:"flex",padding:"7px 0 17px"}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}>
              <span style={{fontSize:18}}>{n.ico}</span>
              <span style={{fontSize:9,fontWeight:page===n.id?700:400,color:page===n.id?T.blush:T.lt,letterSpacing:"0.03em"}}>{n.lbl}</span>
              {page===n.id&&<div style={{width:16,height:2,background:T.blush,borderRadius:99}}/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── SHARED COMPONENTS ─────────────────────────────────────────────
const Card=({T,children,style={}})=>(
  <div style={{background:T.card,backdropFilter:"blur(12px)",borderRadius:18,border:`1px solid ${T.border}`,boxShadow:"0 2px 16px rgba(0,0,0,.07)",...style}}>{children}</div>
);
const SecLabel=({T,children,mb=12})=>(
  <div style={{fontSize:10,letterSpacing:"0.14em",textTransform:"uppercase",color:T.lt,marginBottom:mb}}>{children}</div>
);
const BigNum=({T,v,col})=>(
  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:col||T.text}}>{fmt(v)}</div>
);

// ── DASHBOARD ─────────────────────────────────────────────────────
function Dash({T,cats,budgets,actuals,debts,dpays,accs,assets,goals,nwHist,totInc,totBud,totAct,totDebt,totBal,totAssets,netWorth,mo,yr,userName}){
  const rem=totInc-totAct,pct=totInc>0?Math.min(totAct/totInc*100,100):0;
  const totInt=useMemo(()=>debts.reduce((s,d)=>s+d.bal*(d.apr/100/12),0),[debts]);
  const top5=useMemo(()=>[...debts].sort((a,b)=>b.apr-a.apr).slice(0,5),[debts]);
  const goalsProg=goals.filter(g=>g.target>0);
  const incCats=cats.filter(c=>c.inc);
  const nwPos=netWorth>=0;
  const {text:greetText,emoji:greetEmoji}=getGreeting(userName);
  const quote=QUOTES[mo];

  return(
    <div className="fade">
      {/* Greeting */}
      <div style={{marginBottom:16}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:700,color:T.text,lineHeight:1.1}}>{greetText} {greetEmoji}</div>
        <div style={{fontSize:13,color:T.sub,marginTop:5}}>{MO[mo]} {yr} — financial overview</div>
      </div>
      {/* Monthly quote */}
      <div style={{background:`linear-gradient(135deg,${T.blush}16,${T.mist}0C)`,border:`1px solid ${T.blush}22`,borderRadius:16,padding:"15px 18px",marginBottom:16,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-8,left:8,fontSize:64,opacity:.06,color:T.text,fontFamily:"Georgia,serif",lineHeight:1,pointerEvents:"none"}}>"</div>
        <div style={{fontSize:13,color:T.text,lineHeight:1.7,fontStyle:"italic",marginBottom:9,position:"relative"}}>{quote.q}</div>
        <div style={{fontSize:10,letterSpacing:"0.13em",textTransform:"uppercase",color:T.blush,fontWeight:700}}>✦ {quote.tag}</div>
      </div>

      {/* Net worth hero */}
      <Card T={T} style={{padding:"18px 20px",marginBottom:12,background:nwPos?`linear-gradient(135deg,${T.card},${T.sage}18)`:T.card,border:`1.5px solid ${nwPos?T.sage+"30":T.danger+"30"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <SecLabel T={T} mb={0}>Net Worth</SecLabel>
          <span style={{fontSize:11,color:nwPos?T.sage:T.danger}}>{nwPos?"▲ Building wealth":"▼ Net negative"}</span>
        </div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:700,color:nwPos?T.sage:T.danger,marginBottom:8}}>{fmt(netWorth)}</div>
        <div style={{display:"flex",gap:12}}>
          <span style={{fontSize:12,color:T.lt}}>Assets: <span style={{color:T.sage,fontWeight:700}}>{fmt(totAssets)}</span></span>
          <span style={{fontSize:12,color:T.lt}}>Debts: <span style={{color:T.danger,fontWeight:700}}>{fmt(totDebt)}</span></span>
        </div>
        {/* Net worth history mini-chart */}
        {nwHist.length>1&&(()=>{
          const vals=nwHist.map(h=>h.nw);
          const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
          return(
            <div style={{display:"flex",gap:3,alignItems:"flex-end",height:32,marginTop:12}}>
              {nwHist.map((h,i)=>{
                const ht=Math.max(4,((h.nw-mn)/rng)*28);
                return<div key={i} title={`${MO[h.mo].slice(0,3)} ${h.yr}: ${fmt(h.nw)}`}
                  style={{flex:1,height:ht,background:h.nw>=0?T.sage:T.danger,borderRadius:3,opacity:i===nwHist.length-1?1:0.6,transition:"height .3s"}}/>;
              })}
            </div>
          );
        })()}
      </Card>

      {/* Accounts */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        {Object.entries(accs).map(([k,a])=>(
          <Card key={k} T={T} style={{flex:"1 1 120px",padding:"11px 13px",border:`1.5px solid ${a.col}22`}}>
            <div style={{fontSize:8,color:a.col,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:2}}>{a.type==="savings"?"🏦 Savings":"💳 Checking"}</div>
            <div style={{fontSize:9,color:T.lt,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:a.col}}>{fmtD(a.bal)}</div>
          </Card>
        ))}
        <Card T={T} style={{flex:"1 1 100px",padding:"11px 13px",border:`1.5px solid ${T.sage}22`}}>
          <div style={{fontSize:8,color:T.sage,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:2}}>All Accounts</div>
          <div style={{fontSize:9,color:T.lt,marginBottom:4}}>Combined</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:T.sage}}>{fmtD(totBal)}</div>
        </Card>
      </div>

      {/* Monthly snapshot */}
      <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
        <SecLabel T={T}>Monthly Snapshot</SecLabel>
        <div style={{display:"flex",marginBottom:12}}>
          {[{lbl:"Income",v:totInc,c:T.sage},{lbl:"Budgeted",v:totBud,c:T.blush},{lbl:"Spent",v:totAct,c:T.mist},{lbl:"Left",v:rem,c:rem>=0?T.sage:T.danger}].map((s,i)=>(
            <div key={i} style={{flex:1,textAlign:"center",borderRight:i<3?`1px solid ${T.div}`:"none"}}>
              <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>{s.lbl}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:700,color:s.c}}>{fmt(Math.abs(s.v))}</div>
            </div>
          ))}
        </div>
        <div style={{height:5,background:T.div,borderRadius:99,overflow:"hidden",marginBottom:5}}>
          <div style={{height:"100%",width:`${pct}%`,background:pct>90?T.danger:T.blush,borderRadius:99,transition:"width .5s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.lt}}>
          <span>Spent {Math.round(pct)}% of income</span><span>{fmt(rem)} remaining</span>
        </div>
      </Card>

      {/* Income streams */}
      <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
        <SecLabel T={T}>Income Streams</SecLabel>
        {incCats.map((c,i)=>{
          const cols=[T.sage,T.blush,T.mist,"#A8BDB8"];
          const col=cols[i%cols.length];
          return(
            <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:i<incCats.length-1?10:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:col,flexShrink:0}}/>
                <span style={{fontSize:13,color:T.text}}>{c.lbl}</span>
              </div>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,fontWeight:700,color:col}}>{fmt(budgets[c.id]||0)}/mo</span>
            </div>
          );
        })}
        <div style={{borderTop:`1px solid ${T.div}`,marginTop:12,paddingTop:10,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:700}}>Total Monthly</span>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:T.sage}}>{fmt(totInc)}</span>
        </div>
      </Card>

      {/* Goals preview */}
      {goalsProg.length>0&&(
        <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
          <SecLabel T={T}>Savings Goals</SecLabel>
          {goalsProg.slice(0,3).map(g=>{
            const pct=Math.min(100,Math.round(g.saved/g.target*100));
            return(
              <div key={g.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:13,fontWeight:600}}>{g.ico} {g.name}</span>
                  <span style={{fontSize:12,color:T.lt}}>{pct}% · {fmt(g.saved)} of {fmt(g.target)}</span>
                </div>
                <div style={{height:5,background:T.div,borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:g.col||T.sage,borderRadius:99,transition:"width .5s"}}/>
                </div>
              </div>
            );
          })}
          {goalsProg.length>3&&<div style={{fontSize:11,color:T.lt,textAlign:"center",marginTop:4}}>+{goalsProg.length-3} more — see Goals tab</div>}
        </Card>
      )}

      {/* Top debts */}
      <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <SecLabel T={T} mb={0}>Debt Overview</SecLabel>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:T.blush}}>{fmt(totDebt)}</div>
            <div style={{fontSize:10,color:T.danger}}>{fmt(totInt)}/mo interest</div>
          </div>
        </div>
        {top5.map(d=>{
          const mi=d.bal*(d.apr/100/12),mo2=pmts(d.bal,d.apr,d.min);
          return(<div key={d.id} style={{marginBottom:9}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
              <span style={{fontSize:13,fontWeight:600}}>{d.name}</span>
              <span style={{fontSize:11,color:d.apr>=25?T.danger:T.lt}}>{d.apr}% · {plbl(mo2)}</span>
            </div>
            <div style={{height:4,background:T.div,borderRadius:99,overflow:"hidden",marginBottom:2}}>
              <div style={{height:"100%",width:`${Math.min(d.bal/totDebt*100*4,100)}%`,background:d.col,borderRadius:99}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.lt}}>
              <span>{fmt(d.bal)}</span><span style={{color:T.danger}}>+{fmt(mi)}/mo</span>
            </div>
          </div>);
        })}
        {debts.length>5&&<div style={{fontSize:11,color:T.lt,textAlign:"center",marginTop:4}}>+{debts.length-5} more — see Debts tab</div>}
      </Card>
    </div>
  );
}

// ── BUDGET ────────────────────────────────────────────────────────
function Bud({T,cats,budgets,actuals,onB,onA,onCatLbl,onCatIco,onCatRec,onCatDel,onCatAdd,totInc,totBud,totAct,isShared}){
  const [editMode,setEditMode]=useState(false);
  const rem=totInc-totAct;
  const iE=v=>({background:`${T.blush}0C`,border:`1.5px solid ${T.blush}28`,borderRadius:8,fontSize:13,color:T.text,outline:"none"});

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:T.text}}>Budget Planner</div>
          <div style={{fontSize:12,color:T.sub,marginTop:2}}>{editMode?"✏️ Rename, add, remove, set recurring":"Planned vs. actual — side by side"}</div>
        </div>
        {!isShared&&(
          <button onClick={()=>setEditMode(e=>!e)} style={{padding:"7px 13px",borderRadius:10,border:`1.5px solid ${editMode?T.sage+"50":T.blush+"38"}`,background:editMode?`${T.sage}14`:`${T.blush}10`,fontSize:12,fontWeight:700,color:editMode?T.sage:T.blush,cursor:"pointer",flexShrink:0,marginTop:2}}>
            {editMode?"✓ Done":"✏️ Edit"}
          </button>
        )}
      </div>

      {!editMode&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 84px 84px",gap:5,marginBottom:10,padding:"0 2px"}}>
          <div/>
          <div style={{textAlign:"center",fontSize:10,color:T.blush,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>Planned</div>
          <div style={{textAlign:"center",fontSize:10,color:T.sage,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>Actual</div>
        </div>
      )}

      {Object.entries(GRP).map(([gid,g])=>{
        const gc=cats.filter(c=>c.g===gid);
        if(!gc.length&&!editMode)return null;
        const gb=gc.reduce((s,c)=>s+(budgets[c.id]||0),0);
        const ga=gc.reduce((s,c)=>s+(actuals[c.id]||0),0);
        const gO=!gc.some(c=>c.inc)&&ga>gb&&gb>0;
        return(
          <div key={gid} style={{marginBottom:15}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",background:`${g.col}18`,borderRadius:12,border:`1px solid ${g.col}25`,marginBottom:7}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:14}}>{g.ico}</span>
                <span style={{fontSize:13,fontWeight:700,color:T.text}}>{g.lbl}</span>
              </div>
              {!editMode&&<div style={{display:"flex",gap:14}}>
                <span style={{fontSize:12,fontWeight:700,color:T.blush}}>{fmt(gb)}</span>
                <span style={{fontSize:12,fontWeight:700,color:gO?T.danger:T.sage}}>{fmt(ga)}</span>
              </div>}
            </div>

            {gc.map(cat=>{
              const bv=budgets[cat.id]||0,av=actuals[cat.id]||0,ov=!cat.inc&&av>bv&&bv>0;
              if(editMode) return(
                <div key={cat.id} style={{display:"flex",gap:5,alignItems:"center",marginBottom:5,background:T.card,borderRadius:11,padding:"7px 9px",border:`1px solid ${T.border}`}}>
                  <input value={cat.ico} onChange={e=>onCatIco(cat.id,e.target.value)}
                    style={{width:32,textAlign:"center",fontSize:15,border:`1.5px solid ${T.blush}22`,borderRadius:7,padding:"3px 1px",background:`${T.blush}08`,outline:"none",color:T.text,flexShrink:0}}/>
                  <input value={cat.lbl} onChange={e=>onCatLbl(cat.id,e.target.value)}

                </div>
              );

                <div key={cat.id} style={{display:"grid",gridTemplateColumns:"1fr 84px 84px",gap:5,alignItems:"center",marginBottom:4,background:T.card,borderRadius:11,padding:"7px 9px",border:`1px solid ${T.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,overflow:"hidden"}}>

                    <span style={{fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:T.text}}>{cat.lbl}</span>
                    {cat.rec&&<span title="Recurring — auto-fills each month" style={{fontSize:9,color:T.sage,flexShrink:0}}>↻</span>}
                  </div>
                  {[{v:bv,c:T.blush,fn:v=>onB(cat.id,v),ov:false},{v:av,c:ov?T.danger:T.sage,fn:v=>onA(cat.id,v),ov}].map((inp,i)=>(
                    <div key={i} style={{position:"relative"}}>
                      <span style={{position:"absolute",left:6,top:"50%",transform:"translateY(-50%)",fontSize:10,color:inp.c,fontWeight:700,pointerEvents:"none"}}>$</span>
                      <input type="number" value={(i===0?budgets:actuals)[cat.id]||""} onChange={e=>inp.fn(e.target.value)} disabled={isShared}
                        style={{width:"100%",padding:"5px 3px 5px 14px",fontSize:12,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${inp.c}30`,borderRadius:8,background:inp.ov?`${T.danger}08`:`${inp.c}09`,color:inp.ov?T.danger:T.text,outline:"none",boxSizing:"border-box"}}/>
                    </div>

              </button>

          </div>
        );

      {editMode&&(

          💡 <strong>↻ = Recurring</strong> — toggled green means this row auto-fills its actual from your planned budget at the start of each month. Great for fixed bills. Tap <strong>✓ Done</strong> when finished.
        </div>
      )}

      {!editMode&&(
        <Card T={T} style={{padding:"14px 18px",marginBottom:20}}>
          {[{lbl:"Total Income",v:totInc,c:T.sage},{lbl:"Total Budgeted",v:totBud,c:T.blush},{lbl:"Total Spent",v:totAct,c:totAct>totInc?T.danger:T.mist}].map((s,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:600}}>{s.lbl}</span>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:s.c}}>{fmt(s.v)}</span>
            </div>
          ))}
          <div style={{borderTop:`1px solid ${T.div}`,paddingTop:9,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:14,fontWeight:700}}>Remaining</span>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:rem>=0?T.sage:T.danger}}>{fmt(Math.abs(rem))}</span>
          </div>
        </Card>
      )}
    </div>
  );
}

// ── DEBTS ─────────────────────────────────────────────────────────
function Dbt({T,debts,dpays,onDE,onDD,onPay,newPay,setNewPay,editD,setEditD,showAddD,setShowAddD,ndf,setNdf,onAddDebt,totDebt,isShared}){
  const totInt=useMemo(()=>debts.reduce((s,d)=>s+d.bal*(d.apr/100/12),0),[debts]);
  const sorted=useMemo(()=>[...debts].sort((a,b)=>a.ord-b.ord),[debts]);
  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:T.text}}>Debt Tracker</div>
        <div style={{fontSize:12,color:T.sub,marginTop:2}}>Track, pay, eliminate</div></div>
        <div style={{textAlign:"right"}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:700,color:T.blush}}>{fmt(totDebt)}</div>
          <div style={{fontSize:11,color:T.danger}}>{fmt(totInt)}/mo interest</div>
        </div>
      </div>

      {!isShared&&<>
        <Card T={T} style={{padding:"14px 16px",marginBottom:12}}>
          <SecLabel T={T}>Log a Payment</SecLabel>
          <select value={newPay.did} onChange={e=>setNewPay(p=>({...p,did:e.target.value}))}
            style={{width:"100%",padding:"8px 12px",borderRadius:10,border:`1.5px solid ${T.blush}28`,background:`${T.blush}08`,fontSize:13,color:T.text,marginBottom:7,outline:"none"}}>
            <option value="">Select debt…</option>
            {sorted.map(d=><option key={d.id} value={d.id}>{d.name} — {fmt(d.bal)}</option>)}
          </select>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:7}}>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:11,color:T.blush,fontWeight:700}}>$</span>
              <input type="number" placeholder="Amount" value={newPay.amt} onChange={e=>setNewPay(p=>({...p,amt:e.target.value}))}
                style={{width:"100%",padding:"7px 7px 7px 20px",borderRadius:10,border:`1.5px solid ${T.blush}28`,background:`${T.blush}08`,fontSize:13,color:T.text,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <input type="text" placeholder="Note" value={newPay.note} onChange={e=>setNewPay(p=>({...p,note:e.target.value}))}
              style={{padding:"7px 10px",borderRadius:10,border:`1.5px solid ${T.blush}28`,background:`${T.blush}08`,fontSize:13,color:T.text,outline:"none"}}/>
            <input type="date" value={newPay.date?newPay.date.split("T")[0]:""} onChange={e=>setNewPay(p=>({...p,date:e.target.value}))}
              style={{padding:"7px 8px",borderRadius:10,border:`1.5px solid ${T.blush}28`,background:`${T.blush}08`,fontSize:12,color:T.text,outline:"none"}}/>
          </div>
          <button onClick={onPay} style={{width:"100%",padding:"9px",borderRadius:10,background:`linear-gradient(135deg,${T.blush}20,${T.blush}0C)`,border:`1.5px solid ${T.blush}40`,fontSize:13,fontWeight:700,color:T.blush,cursor:"pointer"}}>
            + Log Payment (updates balance)
          </button>
        </Card>

        <button onClick={()=>setShowAddD(!showAddD)} style={{width:"100%",padding:"9px",borderRadius:12,background:showAddD?`${T.sage}12`:`${T.card}`,border:`1.5px dashed ${T.sage}45`,fontSize:12,fontWeight:700,color:T.sage,cursor:"pointer",marginBottom:12}}>
          {showAddD?"✕ Cancel":"+ Add New Debt"}
        </button>
        {showAddD&&(
          <Card T={T} style={{padding:"13px 14px",marginBottom:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
              <input placeholder="Debt name" value={ndf.name} onChange={e=>setNdf(f=>({...f,name:e.target.value}))}
                style={{gridColumn:"1/-1",padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.blush}28`,background:`${T.blush}08`,fontSize:13,color:T.text,outline:"none"}}/>
              {[{p:"Balance ($)",k:"bal"},{p:"APR (%)",k:"apr"},{p:"Min Payment ($)",k:"min"}].map(f=>(
                <input key={f.k} type="number" placeholder={f.p} value={ndf[f.k]} onChange={e=>setNdf(x=>({...x,[f.k]:e.target.value}))}
                  style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.blush}28`,background:`${T.blush}08`,fontSize:13,color:T.text,outline:"none"}}/>
              ))}
            </div>
            <button onClick={onAddDebt} style={{width:"100%",padding:"8px",borderRadius:9,background:`${T.sage}18`,border:`1.5px solid ${T.sage}38`,fontSize:13,fontWeight:700,color:T.sage,cursor:"pointer"}}>Add Debt</button>
          </Card>
        )}
      </>}

      {sorted.map(d=>{
        const pays=dpays[d.id]||[],paid=pays.reduce((s,p)=>s+p.amt,0);
        const effPay=paid||d.min,mo2=pmts(d.bal,d.apr,effPay),mi=d.bal*(d.apr/100/12);
        const principal=Math.max(0,paid-mi),isE=editD===d.id;
        return(
          <div key={d.id} style={{background:T.card,backdropFilter:"blur(12px)",borderRadius:18,padding:"14px",border:`1.5px solid ${d.col}28`,marginBottom:11,boxShadow:"0 2px 12px rgba(0,0,0,.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div><div style={{fontSize:15,fontWeight:700,color:T.text}}>{d.name}</div>
              <div style={{fontSize:11,color:d.apr>=25?T.danger:T.lt,marginTop:2}}>{d.apr>0?`${d.apr}% APR`:"0% APR"} · Min: {fmt(d.min)}/mo</div></div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:700,color:d.col}}>{fmt(d.bal)}</div>
                {!isShared&&<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:2}}>
                  <button onClick={()=>setEditD(isE?null:d.id)} style={{fontSize:10,color:T.lt,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>{isE?"Done":"Edit"}</button>
                  <button onClick={()=>onDD(d.id)} style={{fontSize:10,color:T.danger,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Delete</button>
                </div>}
              </div>
            </div>
            {isE&&(
              <div style={{background:`${d.col}0E`,borderRadius:11,padding:"11px",marginBottom:10,border:`1px solid ${d.col}20`}}>
                <div style={{fontSize:10,color:T.lt,marginBottom:7,textTransform:"uppercase",letterSpacing:"0.1em"}}>Update</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                  {[{lbl:"Balance",k:"bal"},{lbl:"APR %",k:"apr"},{lbl:"Min Pay",k:"min"}].map(f=>(
                    <div key={f.k}><div style={{fontSize:9,color:T.lt,marginBottom:2}}>{f.lbl}</div>
                    <input type="number" step={f.k==="apr"?"0.1":"1"} value={d[f.k]}
                      onChange={e=>onDE({...d,[f.k]:parseFloat(e.target.value)||0})}
                      style={{width:"100%",padding:"6px 8px",borderRadius:7,border:`1.5px solid ${d.col}35`,background:T.card,color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
                  ))}
                </div>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:paid>0?10:0}}>
              {[
                {lbl:"This Month",v:fmt(paid||0),sub:`${pays.length} payment${pays.length!==1?"s":""}`,c:d.col},
                {lbl:"Payoff Est.",v:plbl(mo2),sub:isFinite(mo2)?`${mo2} mo at ${fmt(effPay)}/mo`:"⚠ increase payment",c:T.text},
                {lbl:"Interest/Mo",v:fmt(mi),sub:d.apr>0?`${d.apr}% APR`:"No interest",c:d.apr>=25?T.danger:T.lt},
              ].map((s,i)=>(
                <div key={i} style={{background:`${d.col}0F`,borderRadius:9,padding:"8px 9px",border:`1px solid ${d.col}18`}}>
                  <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>{s.lbl}</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:i===1?11:14,fontWeight:700,color:s.c,lineHeight:1.2}}>{s.v}</div>
                  <div style={{fontSize:9,color:T.lt,marginTop:2}}>{s.sub}</div>
                </div>
              ))}
            </div>
            {paid>0&&<div style={{marginBottom:pays.length?8:0}}>
              <div style={{height:4,background:T.div,borderRadius:99,overflow:"hidden",marginBottom:3}}>
                <div style={{height:"100%",width:`${Math.min(principal/paid*100,100)}%`,background:T.sage,borderRadius:99}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:T.lt}}>
                <span style={{color:T.sage}}>Principal: {fmt(principal)}</span>
                <span style={{color:T.danger}}>Interest: {fmt(Math.min(mi,paid))}</span>
              </div>
            </div>}
            {pays.length>0&&<div style={{borderTop:`1px solid ${d.col}18`,paddingTop:8}}>
              <div style={{fontSize:10,color:T.lt,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.1em"}}>Payments This Month</div>
              {pays.map((p,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                  <span style={{color:T.lt}}>{p.note||new Date(p.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                  <span style={{fontWeight:700,color:T.sage}}>{fmt(p.amt)}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",borderTop:`1px solid ${d.col}12`,paddingTop:5,marginTop:4}}>
                <span style={{fontSize:12,fontWeight:700}}>Total Paid</span>
                <span style={{fontSize:12,fontWeight:700,color:T.sage}}>{fmt(paid)}</span>
              </div>
            </div>}
          </div>
        );
      })}
    </div>
  );
}

// ── GOALS ─────────────────────────────────────────────────────────
const GOAL_COLS=["#B5C9B8","#C9A99A","#CFC4DC","#A8BDB8","#D4B8A5","#C4C4D4","#DEBCB5","#88B098"];
function Goals({T,goals,onGoalEdit,onGoalDel,onGoalAdd,assets,onAssetVal,onAssetName,onAssetUpdate,onAddAsset,onDelAsset,totDebt,totAssets,netWorth,nwHist,saveNwSnap,isShared}){
  const [showAddG,setShowAddG]=useState(false);
  const [editG,setEditG]=useState(null);
  const [ng,setNg]=useState({name:"",ico:"🎯",target:"",saved:"",monthly:"",col:"#B5C9B8",targetDate:""});
  const [showTypePicker,setShowTypePicker]=useState(false);
  const [zState,setZState]=useState({});  // {[assetId]: {status,value}}
  const nwPos=netWorth>=0;

  async function doZillow(id,address){
    if(!address||!address.trim())return;
    setZState(s=>({...s,[id]:{status:"loading",value:null}}));
    const val=await fetchZillowEstimate(address);
    setZState(s=>({...s,[id]:val?{status:"found",value:val}:{status:"failed",value:null}}));
  }

  function addGoal(){
    if(!ng.name||!ng.target)return;
    onGoalAdd({id:"g"+Date.now(),name:ng.name,ico:ng.ico,target:parseFloat(ng.target)||0,saved:parseFloat(ng.saved)||0,monthly:parseFloat(ng.monthly)||0,col:ng.col,targetDate:ng.targetDate});
    setNg({name:"",ico:"🎯",target:"",saved:"",monthly:"",col:"#B5C9B8",targetDate:""});
    setShowAddG(false);
  }

  return(
    <div className="fade">
      <div style={{marginBottom:16}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:T.text}}>Goals & Net Worth</div>
        <div style={{fontSize:12,color:T.sub,marginTop:2}}>Save intentionally. Track your wealth.</div>
      </div>

      {/* ── Savings Goals ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:T.text}}>Savings Goals</div>
        {!isShared&&<button onClick={()=>setShowAddG(!showAddG)} style={{padding:"6px 12px",borderRadius:9,border:`1.5px solid ${T.sage}45`,background:`${T.sage}12`,fontSize:12,fontWeight:700,color:T.sage,cursor:"pointer"}}>
          {showAddG?"✕ Cancel":"+ New Goal"}
        </button>}
      </div>

      {showAddG&&(
        <Card T={T} style={{padding:"14px 16px",marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"40px 1fr",gap:7,marginBottom:7}}>
            <input value={ng.ico} onChange={e=>setNg(g=>({...g,ico:e.target.value}))}
              style={{textAlign:"center",fontSize:18,border:`1.5px solid ${T.sage}28`,borderRadius:8,padding:"5px 2px",background:`${T.sage}08`,outline:"none",color:T.text}}/>
            <input placeholder="Goal name (e.g. Emergency Fund)" value={ng.name} onChange={e=>setNg(g=>({...g,name:e.target.value}))}
              style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.sage}28`,background:`${T.sage}08`,fontSize:13,color:T.text,outline:"none"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
            {[{p:"Target Amount ($)",k:"target"},{p:"Already Saved ($)",k:"saved"},{p:"Monthly Contribution ($)",k:"monthly"}].map(f=>(
              <input key={f.k} type="number" placeholder={f.p} value={ng[f.k]} onChange={e=>setNg(g=>({...g,[f.k]:e.target.value}))}
                style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.sage}28`,background:`${T.sage}08`,fontSize:13,color:T.text,outline:"none"}}/>
            ))}
            <input type="date" value={ng.targetDate} onChange={e=>setNg(g=>({...g,targetDate:e.target.value}))}
              placeholder="Target date"
              style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.sage}28`,background:`${T.sage}08`,fontSize:12,color:T.text,outline:"none"}}/>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            {GOAL_COLS.map(c=>(
              <button key={c} onClick={()=>setNg(g=>({...g,col:c}))}
                style={{width:22,height:22,borderRadius:"50%",background:c,border:ng.col===c?`2.5px solid ${T.text}`:"2px solid transparent",cursor:"pointer",flexShrink:0}}/>

          </div>
          <button onClick={addGoal} style={{width:"100%",padding:"8px",borderRadius:9,background:`${T.sage}18`,border:`1.5px solid ${T.sage}38`,fontSize:13,fontWeight:700,color:T.sage,cursor:"pointer"}}>Add Goal</button>
        </Card>
      )}

      {goals.length===0&&!showAddG&&(
        <Card T={T} style={{padding:"24px 20px",marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:32,marginBottom:8}}>🎯</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:T.text,marginBottom:4}}>No goals yet</div>
          <div style={{fontSize:12,color:T.lt}}>Add your first savings goal to track your progress.</div>
        </Card>
      )}

      {goals.map(g=>{
        const pct=g.target>0?Math.min(100,Math.round(g.saved/g.target*100)):0;
        const rem=Math.max(0,g.target-g.saved);
        const mo2=g.monthly>0?Math.ceil(rem/g.monthly):Infinity;
        const est=isFinite(mo2)?new Date(Date.now()+mo2*30.4*86400000).toLocaleDateString("en-US",{month:"short",year:"numeric"}):"N/A";
        const isEG=editG===g.id;
        return(
          <div key={g.id} style={{background:T.card,backdropFilter:"blur(12px)",borderRadius:18,padding:"15px",border:`1.5px solid ${g.col}30`,marginBottom:11,boxShadow:"0 2px 12px rgba(0,0,0,.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:9}}>
                <span style={{fontSize:22}}>{g.ico}</span>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:T.text}}>{g.name}</div>
                  <div style={{fontSize:11,color:T.lt,marginTop:1}}>Target: {fmt(g.target)} · {fmt(g.monthly)}/mo contribution</div>
                </div>
              </div>
              {!isShared&&<div style={{display:"flex",gap:8}}>
                <button onClick={()=>setEditG(isEG?null:g.id)} style={{fontSize:10,color:T.lt,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>{isEG?"Done":"Edit"}</button>
                <button onClick={()=>onGoalDel(g.id)} style={{fontSize:10,color:T.danger,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Delete</button>
              </div>}
            </div>

            {isEG&&(
              <div style={{background:`${g.col}0E`,borderRadius:11,padding:"11px",marginBottom:12,border:`1px solid ${g.col}20`}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                  {[{lbl:"Name",k:"name",t:"text"},{lbl:"Target ($)",k:"target",t:"number"},{lbl:"Saved ($)",k:"saved",t:"number"},{lbl:"Monthly ($)",k:"monthly",t:"number"}].map(f=>(
                    <div key={f.k}><div style={{fontSize:9,color:T.lt,marginBottom:2}}>{f.lbl}</div>
                    <input type={f.t} value={g[f.k]} onChange={e=>onGoalEdit({...g,[f.k]:f.t==="number"?parseFloat(e.target.value)||0:e.target.value})}
                      style={{width:"100%",padding:"6px 8px",borderRadius:7,border:`1.5px solid ${g.col}35`,background:T.card,color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
                  ))}
                </div>
              </div>
            )}

            {/* Progress bar */}
            <div style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}}>
                <span style={{color:T.text,fontWeight:700}}>{fmt(g.saved)} saved</span>
                <span style={{color:T.lt}}>{pct}% complete</span>
              </div>
              <div style={{height:8,background:T.div,borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${g.col},${g.col}CC)`,borderRadius:99,transition:"width .5s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.lt,marginTop:4}}>
                <span>{fmt(rem)} remaining</span>
                <span>{g.targetDate?"Target: "+new Date(g.targetDate).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"No target date"}</span>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
              <div style={{background:`${g.col}10`,borderRadius:10,padding:"9px 11px",border:`1px solid ${g.col}20`}}>
                <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>Est. Completion</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,fontWeight:700,color:T.text}}>{est}</div>
                <div style={{fontSize:9,color:T.lt,marginTop:1}}>{isFinite(mo2)?`${mo2} months at current rate`:""}</div>
              </div>
              <div style={{background:`${g.col}10`,borderRadius:10,padding:"9px 11px",border:`1px solid ${g.col}20`}}>
                <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>To Reach Goal</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,fontWeight:700,color:T.text}}>{fmt(rem)}</div>
                <div style={{fontSize:9,color:T.lt,marginTop:1}}>{fmt(g.monthly)}/mo needed</div>
              </div>
            </div>
          </div>
        );
      })}

      {/* ── Net Worth ── */}
      <div style={{marginTop:8,marginBottom:10,fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:T.text}}>Net Worth</div>

      <Card T={T} style={{padding:"16px 18px",marginBottom:12,background:nwPos?`linear-gradient(135deg,${T.card},${T.sage}15)`:T.card,border:`1.5px solid ${nwPos?T.sage+"28":T.danger+"28"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <SecLabel T={T} mb={4}>Total Assets</SecLabel>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:T.sage}}>{fmt(totAssets)}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <SecLabel T={T} mb={4}>Total Liabilities</SecLabel>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:T.danger}}>{fmt(totDebt)}</div>
          </div>
        </div>
        <div style={{borderTop:`1px solid ${T.div}`,paddingTop:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:15,fontWeight:700}}>Net Worth</span>
          <div style={{textAlign:"right"}}>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:nwPos?T.sage:T.danger}}>{fmt(netWorth)}</span>
            {!isShared&&<button onClick={()=>saveNwSnap(netWorth)} style={{display:"block",marginTop:3,marginLeft:"auto",fontSize:10,color:T.lt,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Save snapshot</button>}
          </div>
        </div>
      </Card>

      {/* History chart */}
      {nwHist.length>1&&(
        <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
          <SecLabel T={T}>Net Worth History</SecLabel>
          {(()=>{
            const vals=nwHist.map(h=>h.nw);
            const mn=Math.min(...vals,0),mx=Math.max(...vals,0),rng=mx-mn||1;
            const zeroH=Math.max(0,Math.min(52,(-mn/rng)*52));
            return(
              <div>
                <div style={{display:"flex",gap:4,alignItems:"flex-end",height:56,position:"relative"}}>
                  <div style={{position:"absolute",bottom:zeroH,left:0,right:0,height:1,background:T.div,pointerEvents:"none"}}/>
                  {nwHist.map((h,i)=>{
                    const aboveZ=Math.max(0,h.nw)*52/rng;
                    const belowZ=Math.max(0,-h.nw)*52/rng;
                    return(
                      <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"stretch",justifyContent:"flex-end",height:"100%",cursor:"default"}} title={`${MO[h.mo].slice(0,3)} ${h.yr}: ${fmt(h.nw)}`}>
                        {h.nw>0&&<div style={{background:T.sage,borderRadius:"3px 3px 0 0",height:aboveZ,opacity:i===nwHist.length-1?1:.65}}/>}
                        {h.nw<0&&<div style={{background:T.danger,borderRadius:"0 0 3px 3px",height:belowZ,opacity:i===nwHist.length-1?1:.65}}/>}
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",gap:4,marginTop:4}}>
                  {nwHist.map((h,i)=>(
                    <div key={i} style={{flex:1,fontSize:8,textAlign:"center",color:T.lt,overflow:"hidden"}}>{MO[h.mo].slice(0,1)}</div>
                  ))}
                </div>
              </div>
            );
          })()}
        </Card>
      )}

      {/* ── Assets ── */}
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:T.text,marginBottom:10,marginTop:8}}>Your Assets</div>

      {/* Type picker / Add button */}
      {!isShared&&(
        <div style={{marginBottom:12}}>
          {showTypePicker?(
            <div style={{background:T.card,backdropFilter:"blur(12px)",borderRadius:18,padding:"16px",border:`1px solid ${T.border}`,marginBottom:8}}>
              <div style={{fontSize:12,color:T.lt,marginBottom:10,textAlign:"center",letterSpacing:"0.06em"}}>What type of asset are you adding?</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
                {Object.entries(ASSET_TYPES).map(([k,t])=>(
                  <button key={k} onClick={()=>{onAddAsset(k);setShowTypePicker(false);}}
                    style={{padding:"12px 6px",borderRadius:12,border:`1.5px solid ${T.sage}28`,background:`${T.sage}0A`,cursor:"pointer",textAlign:"center",transition:"background .15s"}}>
                    <div style={{fontSize:22,marginBottom:4}}>{t.ico}</div>
                    <div style={{fontSize:11,fontWeight:700,color:T.text,marginBottom:2}}>{t.lbl}</div>
                    <div style={{fontSize:9,color:T.lt,lineHeight:1.3}}>{t.hint}</div>
                  </button>
                ))}
              </div>
              <button onClick={()=>setShowTypePicker(false)} style={{width:"100%",padding:"7px",borderRadius:10,border:`1px solid ${T.div}`,background:"transparent",fontSize:12,color:T.lt,cursor:"pointer"}}>Cancel</button>
            </div>
          ):(
            <button onClick={()=>setShowTypePicker(true)}
              style={{width:"100%",padding:"10px",borderRadius:13,background:`${T.sage}0A`,border:`1.5px dashed ${T.sage}40`,fontSize:13,fontWeight:700,color:T.sage,cursor:"pointer"}}>
              + Add Property or Asset
            </button>
          )}
        </div>
      )}

      {/* Asset cards */}
      {assets.map(a=>{
        const isProp=a.type==="property";
        const zs=zState[a.id]||{status:"idle"};
        const typeInfo=ASSET_TYPES[a.type]||ASSET_TYPES.other;
        return(
          <div key={a.id} style={{background:T.card,backdropFilter:"blur(12px)",borderRadius:18,padding:"15px 16px",border:`1.5px solid ${T.sage}20`,marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,.05)"}}>
            {/* Name row */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:20,flexShrink:0}}>{a.ico}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>{typeInfo.lbl}</div>
                <input value={a.name} onChange={e=>onAssetName(a.id,e.target.value)} disabled={isShared}
                  style={{width:"100%",fontSize:14,fontWeight:700,border:"none",background:"transparent",color:T.text,outline:"none",padding:0}}/>
              </div>
              {!isShared&&<button onClick={()=>onDelAsset(a.id)} style={{fontSize:15,color:T.danger,background:"none",border:"none",cursor:"pointer",flexShrink:0,opacity:.7}}>×</button>}
            </div>

            {/* Property address + Zillow lookup */}
            {isProp&&!isShared&&(
              <div style={{marginBottom:12,padding:"12px",borderRadius:12,background:`${T.blush}07`,border:`1px solid ${T.blush}18`}}>
                <div style={{fontSize:10,color:T.blush,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:6}}>🏠 Property Address</div>
                <div style={{display:"flex",gap:7,marginBottom:8}}>
                  <input value={a.address||""} onChange={e=>onAssetUpdate(a.id,{address:e.target.value})}
                    placeholder="e.g. 123 Main St, Seattle, WA 98101"
                    style={{flex:1,fontSize:12,border:`1.5px solid ${T.blush}30`,borderRadius:9,padding:"8px 10px",background:`${T.blush}08`,color:T.text,outline:"none"}}/>
                  <button onClick={()=>doZillow(a.id,a.address||"")}
                    disabled={zs.status==="loading"||!a.address?.trim()}
                    style={{padding:"8px 12px",borderRadius:9,border:`1.5px solid ${T.blush}40`,background:zs.status==="loading"?`${T.blush}22`:`${T.blush}14`,fontSize:13,fontWeight:700,color:T.blush,cursor:"pointer",flexShrink:0,opacity:!a.address?.trim()?.length?0.35:1,transition:"all .2s"}}>
                    {zs.status==="loading"?"…":"🔍"}
                  </button>
                </div>

                {/* Result states */}
                {zs.status==="idle"&&a.address?.trim()&&(
                  <div style={{fontSize:11,color:T.lt,fontStyle:"italic"}}>Tap 🔍 to look up the Zillow Zestimate® for this address</div>
                )}
                {zs.status==="loading"&&(
                  <div style={{fontSize:12,color:T.blush,fontStyle:"italic"}}>Searching Zillow…</div>
                )}
                {zs.status==="found"&&(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderRadius:10,background:`${T.sage}12`,border:`1.5px solid ${T.sage}30`}}>
                    <div>
                      <div style={{fontSize:9,color:T.sage,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:3}}>Zillow Zestimate® found</div>
                      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.sage}}>{fmt(zs.value)}</div>
                    </div>
                    <button onClick={()=>{onAssetVal(a.id,zs.value);setZState(s=>({...s,[a.id]:{...zs,status:"imported"}}));}}
                      style={{padding:"8px 14px",borderRadius:10,background:`${T.sage}22`,border:`1.5px solid ${T.sage}50`,fontSize:13,fontWeight:700,color:T.sage,cursor:"pointer"}}>
                      Import ↓
                    </button>
                  </div>
                )}
                {zs.status==="imported"&&(
                  <div style={{fontSize:12,color:T.sage,fontWeight:600}}>✓ Zestimate imported — update anytime</div>
                )}
                {zs.status==="failed"&&(
                  <div style={{padding:"10px 12px",borderRadius:10,background:`${T.blush}0A`,border:`1px solid ${T.blush}20`}}>
                    <div style={{fontSize:12,color:T.sub,marginBottom:7,lineHeight:1.55}}>Zillow blocked the auto-lookup (they protect against bots). Open Zillow to find your Zestimate, then enter it in the value field below.</div>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <a href={`https://www.zillow.com/homes/${encodeURIComponent(a.address||"")}_rb/`} target="_blank" rel="noreferrer"
                        style={{fontSize:12,color:T.blush,fontWeight:700,textDecoration:"none"}}>Open Zillow ↗</a>
                      <button onClick={()=>doZillow(a.id,a.address||"")} style={{fontSize:11,color:T.lt,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Try again</button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Value */}
            <div>
              <div style={{fontSize:10,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>
                {isProp?"Estimated Value":"Value"}
              </div>
              <div style={{position:"relative"}}>
                <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:18,color:T.sage,fontFamily:"'Cormorant Garamond',serif",fontWeight:700}}>$</span>
                <input type="number" value={a.val||""} onChange={e=>onAssetVal(a.id,e.target.value)} disabled={isShared}
                  placeholder="0"
                  style={{width:"100%",padding:"10px 10px 10px 30px",fontSize:22,fontFamily:"'Cormorant Garamond',serif",fontWeight:700,border:`1.5px solid ${T.sage}30`,borderRadius:12,background:`${T.sage}09`,color:T.sage,outline:"none",boxSizing:"border-box"}}/>
              </div>
            </div>
          </div>
        );
      })}

      {assets.length===0&&!showTypePicker&&(
        <div style={{textAlign:"center",padding:"20px",color:T.lt,fontSize:12}}>No assets yet — tap "+ Add Property or Asset" to get started.</div>
      )}

      <Card T={T} style={{padding:"13px 18px",marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,fontWeight:700}}>Total Assets</span>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:T.sage}}>{fmt(totAssets)}</span>
        </div>
      </Card>
    </div>
  );
}

// ── MORE ──────────────────────────────────────────────────────────
function More({T,accs,onAcc,onAddAcc,onDelAcc,totBal,notes,onNotes,toggleDark,dark,doExp,mo,yr,isShared,cats,budgets,actuals,goals,assets,totDebt,userName,onName}){
  const shareUrl=`${window.location.origin}${window.location.pathname}?shared=true`;
  const [copied,setCopied]=useState(false);
  function copyShare(){navigator.clipboard.writeText(shareUrl).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});}

  return(
    <div className="fade">
      <div style={{marginBottom:16}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:T.text}}>More</div>
        <div style={{fontSize:12,color:T.sub,marginTop:2}}>Accounts, notes, settings & export</div>
      </div>

      {/* Monthly Notes */}
      <Card T={T} style={{padding:"16px 18px",marginBottom:14}}>
        <SecLabel T={T}>📝 Monthly Notes — {MO[mo]} {yr}</SecLabel>
        <textarea value={notes} onChange={e=>onNotes(e.target.value)} disabled={isShared}
          placeholder="Jot down anything notable about this month — an unexpected expense, a bonus, why you went over in a category…"
          rows={5}
          style={{width:"100%",padding:"10px 12px",borderRadius:12,border:`1.5px solid ${T.blush}28`,background:`${T.blush}07`,fontSize:13,color:T.text,outline:"none",lineHeight:1.6,boxSizing:"border-box"}}/>
        {notes&&<div style={{fontSize:11,color:T.lt,marginTop:6,textAlign:"right"}}>Auto-saving…</div>}
      </Card>

      {/* Accounts */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:T.text}}>🏦 Accounts</div>
        {!isShared&&<button onClick={onAddAcc}
          style={{padding:"6px 12px",borderRadius:9,border:`1.5px solid ${T.sage}40`,background:`${T.sage}10`,fontSize:12,fontWeight:700,color:T.sage,cursor:"pointer"}}>
          + Add Account
        </button>}
      </div>

      {/* Combined total */}
      <Card T={T} style={{padding:"14px 18px",marginBottom:12,textAlign:"center"}}>
        <SecLabel T={T} mb={5}>Combined Balance</SecLabel>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:700,color:T.text}}>{fmtD(totBal)}</div>
        <div style={{fontSize:11,color:T.lt,marginTop:4}}>{Object.keys(accs).length} account{Object.keys(accs).length!==1?"s":""}</div>
      </Card>

      {Object.entries(accs).map(([k,a])=>(
        <div key={k} style={{background:T.card,backdropFilter:"blur(12px)",borderRadius:18,padding:"16px 18px",border:`1.5px solid ${a.col}28`,marginBottom:12,boxShadow:"0 2px 14px rgba(0,0,0,.06)"}}>
          {/* Header: type badge + delete */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            {/* Checking / Savings toggle */}
            <div style={{display:"flex",gap:5}}>
              {["checking","savings"].map(t=>(
                <button key={t} onClick={()=>!isShared&&onAcc(k,"type",t)} disabled={isShared}
                  style={{padding:"4px 11px",borderRadius:99,border:`1.5px solid ${a.col}${a.type===t?"50":"22"}`,background:a.type===t?`${a.col}20`:"transparent",fontSize:11,fontWeight:a.type===t?700:400,color:a.type===t?a.col:T.lt,cursor:isShared?"default":"pointer",transition:"all .15s"}}>
                  {t==="checking"?"💳 Checking":"🏦 Savings"}
                </button>
              ))}
            </div>
            {!isShared&&<button onClick={()=>onDelAcc(k)}
              style={{fontSize:13,color:T.danger,background:"none",border:"none",cursor:"pointer",opacity:.7,padding:"2px 6px"}}>
              Remove
            </button>}
          </div>

          {/* Name */}
          <div style={{marginBottom:10}}>
            <SecLabel T={T} mb={5}>Account Name</SecLabel>
            <input value={a.name} onChange={e=>onAcc(k,"name",e.target.value)} disabled={isShared}
              placeholder="e.g. Chase Checking"
              style={{width:"100%",padding:"8px 12px",borderRadius:10,border:`1.5px solid ${a.col}28`,background:`${a.col}08`,fontSize:14,fontWeight:600,color:T.text,outline:"none",boxSizing:"border-box"}}/>
          </div>

          {/* Balance */}
          <div>
            <SecLabel T={T} mb={5}>Current Balance</SecLabel>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:20,color:a.col,fontFamily:"'Cormorant Garamond',serif",fontWeight:600}}>$</span>
              <input type="number" step="0.01" value={a.bal||""} onChange={e=>onAcc(k,"bal",e.target.value)} disabled={isShared}
                placeholder="0.00"
                style={{width:"100%",padding:"10px 12px 10px 28px",borderRadius:12,border:`1.5px solid ${a.col}35`,background:`${a.col}0E`,fontSize:24,fontFamily:"'Cormorant Garamond',serif",fontWeight:700,color:a.col,outline:"none",boxSizing:"border-box"}}/>
            </div>
          </div>
        </div>
      ))}

      {Object.keys(accs).length===0&&(
        <div style={{textAlign:"center",padding:"20px",color:T.lt,fontSize:12,marginBottom:12}}>No accounts yet — tap "+ Add Account" to get started.</div>
      )}

      {!isShared&&(
        <button onClick={onAddAcc} style={{width:"100%",padding:"10px",borderRadius:13,background:`${T.sage}09`,border:`1.5px dashed ${T.sage}38`,fontSize:13,fontWeight:700,color:T.sage,cursor:"pointer",marginBottom:14}}>
          + Add Another Account
        </button>
      )}

      {/* Export */}
      {!isShared&&(
        <>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:T.text,marginBottom:10}}>📤 Export</div>
          <Card T={T} style={{padding:"16px 18px",marginBottom:14}}>
            <div style={{fontSize:13,color:T.sub,marginBottom:12,lineHeight:1.6}}>Download a CSV summary of {MO[mo]} {yr} including your budget, savings goals, net worth, and monthly notes. Great for sharing with a financial advisor or keeping records.</div>
            <button onClick={doExp} style={{width:"100%",padding:"11px",borderRadius:12,background:`linear-gradient(135deg,${T.sage}22,${T.sage}0C)`,border:`1.5px solid ${T.sage}45`,fontSize:14,fontWeight:700,color:T.sage,cursor:"pointer"}}>
              ⬇️ Download {MO[mo]} {yr} CSV
            </button>
          </Card>
        </>
      )}

      {/* Settings */}
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:T.text,marginBottom:10}}>⚙️ Settings</div>
      <Card T={T} style={{padding:"16px 18px",marginBottom:14}}>
        {/* Name */}
        {!isShared&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:600,color:T.text,marginBottom:3}}>👤 Your Name</div>
            <div style={{fontSize:11,color:T.lt,marginBottom:8}}>Personalizes your dashboard greeting</div>
            <input value={userName} onChange={e=>onName(e.target.value)} placeholder="Enter your name…" maxLength={30}
              style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1.5px solid ${T.blush}30`,background:`${T.blush}09`,fontSize:14,color:T.text,outline:"none",boxSizing:"border-box"}}/>
          </div>
        )}
        <div style={{borderTop:`1px solid ${T.div}`,paddingTop:16,marginBottom:16}}/>
        {/* Dark mode */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontSize:14,fontWeight:600,color:T.text}}>{dark?"🌙 Dark Mode":"☀️ Light Mode"}</div>
            <div style={{fontSize:11,color:T.lt,marginTop:2}}>Switch appearance</div>
          </div>
          <button onClick={toggleDark}
            style={{width:52,height:28,borderRadius:99,background:dark?T.blush:T.div,border:"none",cursor:"pointer",position:"relative",transition:"background .3s",flexShrink:0}}>
            <div style={{position:"absolute",top:3,left:dark?26:3,width:22,height:22,borderRadius:"50%",background:"white",transition:"left .25s",boxShadow:"0 1px 4px rgba(0,0,0,.25)"}}/>
          </button>
        </div>

        {/* Partner share */}
        {!isShared&&(
          <div style={{borderTop:`1px solid ${T.div}`,paddingTop:14}}>
            <div style={{fontSize:14,fontWeight:600,color:T.text,marginBottom:2}}>🔗 Partner / Shared View</div>
            <div style={{fontSize:11,color:T.lt,marginBottom:10,lineHeight:1.6}}>Share a read-only link with your partner or anyone else. They can see your dashboard, budget, debts, and goals — but can't edit anything.</div>
            <button onClick={copyShare}
              style={{width:"100%",padding:"9px",borderRadius:10,background:copied?`${T.sage}18`:`${T.blush}12`,border:`1.5px solid ${copied?T.sage:T.blush}40`,fontSize:13,fontWeight:700,color:copied?T.sage:T.blush,cursor:"pointer",transition:"all .2s"}}>
              {copied?"✓ Link Copied!":"📋 Copy Share Link"}
            </button>
            <div style={{fontSize:10,color:T.lt,marginTop:7,textAlign:"center",wordBreak:"break-all",opacity:.7}}>{shareUrl}</div>
          </div>
        )}
      </Card>

      <div style={{textAlign:"center",fontSize:11,color:T.lt,lineHeight:1.9,marginBottom:20}}>
        💗 All data syncs automatically across your devices.<br/>
        Built with care for your financial journey.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
