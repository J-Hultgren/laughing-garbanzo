            </div>}
          </div>
        );
      })}

      {/* Net Worth */}
      <div style={{marginTop:6,marginBottom:10,fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:T.text}}>Net Worth</div>
      <Card T={T} style={{padding:"16px 18px",marginBottom:11,background:nwPos?`linear-gradient(135deg,${T.card},${T.a2}14)`:T.card,border:`1.5px solid ${nwPos?T.a2+"28":T.danger+"28"}`}}>
        <Row style={{marginBottom:12}}>
          <div><SL T={T} mb={3}>Total Assets</SL><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:T.a2}}>{fmt(totAssets)}</div></div>
          <div style={{textAlign:"right"}}><SL T={T} mb={3}>Total Liabilities</SL><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:T.danger}}>{fmt(totDebt)}</div></div>
        </Row>
        <Row style={{borderTop:`1px solid ${T.div}`,paddingTop:11,alignItems:"flex-end"}}>
          <span style={{fontSize:15,fontWeight:700}}>Net Worth</span>
          <div style={{textAlign:"right"}}>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:nwPos?T.a2:T.danger}}>{fmt(netWorth)}</span>
            {!isShared&&<button onClick={()=>saveNwSnap(netWorth)} style={{display:"block",marginTop:2,marginLeft:"auto",fontSize:10,color:T.lt,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Save snapshot</button>}
          </div>
        </Row>
        {nwHist.length>1&&(()=>{
          const vals=nwHist.map(h=>h.nw),mn=Math.min(...vals,0),mx=Math.max(...vals,0),rng=mx-mn||1;
          const zH=Math.max(0,Math.min(52,(-mn/rng)*52));
          return(<div style={{marginTop:12}}>
            <div style={{display:"flex",gap:3,alignItems:"flex-end",height:54,position:"relative"}}>
              <div style={{position:"absolute",bottom:zH,left:0,right:0,height:1,background:T.div,pointerEvents:"none"}}/>
              {nwHist.map((h,i)=>{
                const aZ=Math.max(0,h.nw)*52/rng,bZ=Math.max(0,-h.nw)*52/rng;
                return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"stretch",justifyContent:"flex-end",height:"100%"}} title={`${MO[h.mo].slice(0,3)} ${h.yr}: ${fmt(h.nw)}`}>
                  {h.nw>0&&<div style={{background:T.a2,borderRadius:"3px 3px 0 0",height:aZ,opacity:i===nwHist.length-1?1:.6}}/>}
                  {h.nw<0&&<div style={{background:T.danger,borderRadius:"0 0 3px 3px",height:bZ,opacity:i===nwHist.length-1?1:.6}}/>}
                </div>);
              })}
            </div>
            <div style={{display:"flex",gap:3,marginTop:3}}>
              {nwHist.map((h,i)=><div key={i} style={{flex:1,fontSize:7,textAlign:"center",color:T.lt}}>{MO[h.mo].slice(0,1)}</div>)}
            </div>
          </div>);
        })()}
      </Card>

      {/* Assets */}
      <Row style={{marginBottom:10}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:T.text}}>Your Assets</div>
        {!isShared&&<Btn T={T} onClick={()=>setShowAssetPicker(!showAssetPicker)} accent={T.a2} style={{padding:"6px 12px",fontSize:12}}>{showAssetPicker?"✕ Close":"+ Add Asset"}</Btn>}
      </Row>
      {showAssetPicker&&<Card T={T} style={{padding:"14px",marginBottom:11}}>
        <div style={{fontSize:11,color:T.lt,marginBottom:9,textAlign:"center"}}>What type of asset?</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:9}}>
          {Object.entries(ASSET_TYPES).map(([k,t])=>(
            <button key={k} onClick={()=>{onAddAsset(k);setShowAssetPicker(false);}} style={{padding:"11px 5px",borderRadius:12,border:`1.5px solid ${T.a2}28`,background:`${T.a2}0A`,cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:20,marginBottom:3}}>{t.ico}</div>
              <div style={{fontSize:11,fontWeight:700,color:T.text,marginBottom:1}}>{t.lbl}</div>
              <div style={{fontSize:9,color:T.lt}}>{t.hint}</div>
            </button>
          ))}
        </div>
        <Btn T={T} full onClick={()=>setShowAssetPicker(false)} accent={T.lt} outline style={{fontSize:11}}>Cancel</Btn>
      </Card>}

      {assets.map(a=>{
        const isProp=a.type==="property";const zs=zState[a.id]||{};const ti=ASSET_TYPES[a.type]||ASSET_TYPES.other;
        return(<div key={a.id} style={{background:T.card,borderRadius:16,padding:"14px 15px",border:`1.5px solid ${T.a2}20`,marginBottom:10}}>
          <Row style={{marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>{a.ico}</span>
              <div><div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>{ti.lbl}</div>
              <input value={a.name} onChange={e=>onAssetName(a.id,e.target.value)} disabled={isShared} style={{fontSize:14,fontWeight:700,border:"none",background:"transparent",color:T.text,outline:"none",padding:0,width:"100%"}}/></div>
            </div>
            {!isShared&&<button onClick={()=>onDelAsset(a.id)} style={{fontSize:14,color:T.danger,background:"none",border:"none",cursor:"pointer",opacity:.7}}>×</button>}
          </Row>
          {isProp&&!isShared&&<div style={{marginBottom:10,padding:"11px",borderRadius:11,background:`${T.a}08`,border:`1px solid ${T.a}18`}}>
            <div style={{fontSize:9,color:T.a,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:5}}>🏠 Zillow Lookup</div>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <input value={a.address||""} onChange={e=>onAssetUpdate(a.id,{address:e.target.value})} placeholder="123 Main St, City, ST 00000" style={{flex:1,fontSize:12,border:`1.5px solid ${T.a}28`,borderRadius:8,padding:"7px 9px",background:`${T.a}08`,color:T.text,outline:"none"}}/>
              <button onClick={()=>doZillow(a.id,a.address||"")} disabled={zs.status==="loading"||!a.address?.trim()} style={{padding:"7px 11px",borderRadius:8,border:`1.5px solid ${T.a}40`,background:`${T.a}14`,fontSize:13,fontWeight:700,color:T.a,cursor:"pointer",opacity:!a.address?.trim()?.length?.5:1}}>
                {zs.status==="loading"?"…":"🔍"}
              </button>
            </div>
            {zs.status==="found"&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 11px",borderRadius:9,background:`${T.a2}12`,border:`1.5px solid ${T.a2}30`}}>
              <div><div style={{fontSize:9,color:T.a2,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:2}}>Zillow Zestimate®</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:T.a2}}>{fmt(zs.value)}</div></div>
              <Btn T={T} onClick={()=>{onAssetVal(a.id,zs.value);setZState(s=>({...s,[a.id]:{...zs,status:"imported"}}))}  } accent={T.a2} style={{padding:"7px 12px",fontSize:12}}>Import ↓</Btn>
            </div>}
            {zs.status==="imported"&&<div style={{fontSize:12,color:T.a2,fontWeight:600}}>✓ Zestimate imported</div>}
            {zs.status==="failed"&&<div style={{fontSize:11,color:T.sub,lineHeight:1.5}}>Zillow blocked auto-lookup. <a href={`https://www.zillow.com/homes/${encodeURIComponent(a.address||"")}_rb/`} target="_blank" rel="noreferrer" style={{color:T.a,fontWeight:700,textDecoration:"none"}}>Open Zillow ↗</a> and enter value below.</div>}
          </div>}
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:17,color:T.a2,fontFamily:"'Cormorant Garamond',serif",fontWeight:700}}>$</span>
            <input type="number" value={a.val||""} onChange={e=>onAssetVal(a.id,e.target.value)} disabled={isShared} placeholder="0"
              style={{width:"100%",padding:"9px 10px 9px 26px",fontSize:20,fontFamily:"'Cormorant Garamond',serif",fontWeight:700,border:`1.5px solid ${T.a2}28`,borderRadius:11,background:`${T.a2}09`,color:T.a2,outline:"none",boxSizing:"border-box"}}/>
          </div>
        </div>);
      })}
      <Card T={T} style={{padding:"12px 16px",marginBottom:18}}><Row>
        <span style={{fontSize:13,fontWeight:700}}>Total Assets</span>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:T.a2}}>{fmt(totAssets)}</span>
      </Row></Card>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  SCENARIOS
// ════════════════════════════════════════════════════════════════
function Scenarios({T,debts,cats,budgets,totInc,totBud,totDebt,accs,totBal,isShared,scenarioTab,setScenarioTab,onImplement}){
  const [tab,setTabLocal]=useState(scenarioTab||"debt");
  // Sync tab when navigated from Focus
  useEffect(()=>{if(scenarioTab)setTabLocal(scenarioTab);},[scenarioTab]);
  function setTab(t){setTabLocal(t);setScenarioTab(t);}

  const [selDebt,setSelDebt]=useState(debts[0]?.id||"");
  const [extra,setExtra]=useState(0);
  const [windfall,setWindfall]=useState(0);
  const [winDebtId,setWinDebtId]=useState(debts[0]?.id||"");
  const [lostIncome,setLostIncome]=useState([]);
  // Editable income amounts (for "what if I earned less from X")
  const [adjAmounts,setAdjAmounts]=useState({});
  // Multiple added income streams
  const [addedStreams,setAddedStreams]=useState([{id:"as0",lbl:"New stream",amt:""}]);
  function addStream(){setAddedStreams(s=>[...s,{id:"as"+Date.now(),lbl:"New stream",amt:""}]);}
  function removeStream(id){setAddedStreams(s=>s.filter(x=>x.id!==id));}
  function updateStream(id,field,val){setAddedStreams(s=>s.map(x=>x.id===id?{...x,[field]:val}:x));}

  const sorted=useMemo(()=>[...debts].sort((a,b)=>a.ord-b.ord),[debts]);
  const debt=debts.find(d=>d.id===selDebt)||debts[0];
  const winDebt=debts.find(d=>d.id===winDebtId)||debts[0];

  // Debt payoff scenario
  const curPay=debt?debt.min:0;
  const newPay=curPay+extra;
  const curMo=debt?pmts(debt.bal,debt.apr,curPay):0;
  const newMo=debt?pmts(debt.bal,debt.apr,newPay):0;
  const moSaved=isFinite(curMo)&&isFinite(newMo)?Math.max(0,curMo-newMo):0;
  const intSaved=debt?Math.max(0,totalInterest(debt.bal,debt.apr,curPay)-totalInterest(debt.bal,debt.apr,newPay)):0;

  // Income scenario
  const incCats=cats.filter(c=>c.inc);
  const moExpenses=cats.filter(c=>!c.inc).reduce((s,c)=>s+(budgets[c.id]||0),0);
  const lostAmt=lostIncome.reduce((s,id)=>{
    const c=incCats.find(x=>x.id===id);
    const original=budgets[c?.id]||0;
    const adjusted=adjAmounts[id]!==undefined?parseFloat(adjAmounts[id])||0:0;
    return s+(original-adjusted);
  },0);
  const addedAmt=addedStreams.reduce((s,x)=>s+(parseFloat(x.amt)||0),0);
  const newIncome=Math.max(0,totInc-lostAmt+addedAmt);
  const newCashflow=newIncome-moExpenses;
  const runway=moExpenses>0?totBal/moExpenses:0;
  const newRunway=moExpenses>0?totBal/(moExpenses+(newIncome<moExpenses?moExpenses-newIncome:0)):runway;

  // Windfall scenario
  const wAfter=windfall>0&&winDebt?Math.max(0,winDebt.bal-windfall):winDebt?.bal||0;
  const wMoNow=winDebt?pmts(winDebt.bal,winDebt.apr,winDebt.min):0;
  const wMoAfter=winDebt?pmts(wAfter,winDebt.apr,winDebt.min):0;
  const wIntSaved=winDebt?Math.max(0,totalInterest(winDebt.bal,winDebt.apr,winDebt.min)-totalInterest(wAfter,winDebt.apr,winDebt.min)):0;

  const TABS=[{id:"debt",lbl:"💳 Extra Payment"},{id:"income",lbl:"💼 Income Change"},{id:"windfall",lbl:"🎁 Windfall"}];

  const SliderRow=({label,val,min,max,step,onChange,fmt:fmtFn})=>(
    <div style={{marginBottom:16}}>
      <Row style={{marginBottom:8}}>
        <span style={{fontSize:12,color:T.text,fontWeight:600}}>{label}</span>
        <div style={{background:`${T.a}18`,border:`1.5px solid ${T.a}35`,borderRadius:10,padding:"4px 12px"}}>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:T.a}}>{fmtFn?fmtFn(val):val}</span>
          <span style={{fontSize:10,color:T.lt,marginLeft:3}}>/mo</span>
        </div>
      </Row>
      <div style={{position:"relative",padding:"8px 0"}}>
        <input type="range" min={min} max={max} step={step} value={val}
          onChange={e=>onChange(parseFloat(e.target.value))}
          style={{width:"100%",height:6,accentColor:T.a,cursor:"pointer",appearance:"none",WebkitAppearance:"none",background:`linear-gradient(to right,${T.a} ${((val-min)/(max-min))*100}%,${T.div} ${((val-min)/(max-min))*100}%)`,borderRadius:99,outline:"none"}}/>
      </div>
      <Row style={{fontSize:9,color:T.lt}}><span>{fmtFn?fmtFn(min):min}</span><span style={{color:T.lt}}>drag to adjust</span><span>{fmtFn?fmtFn(max):max}</span></Row>
    </div>
  );

  const ResultBox=({label,old:o,now:n,good,fmtFn,unit=""})=>{
    const better=(good==="lower")?n<o:n>o;
    const diff=n-o;
    return(
      <div style={{background:`${better?T.a2:T.danger}0E`,borderRadius:11,padding:"11px 13px",border:`1.5px solid ${better?T.a2:T.danger}25`,marginBottom:8}}>
        <div style={{fontSize:10,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>{label}</div>
        <Row>
          <div style={{textAlign:"center",flex:1}}>
            <div style={{fontSize:9,color:T.lt,marginBottom:2}}>Current</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:T.lt}}>{fmtFn?fmtFn(o):o}{unit}</div>
          </div>
          <div style={{fontSize:18,color:better?T.a2:T.danger}}>→</div>
          <div style={{textAlign:"center",flex:1}}>
            <div style={{fontSize:9,color:T.lt,marginBottom:2}}>New</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:better?T.a2:T.danger}}>{fmtFn?fmtFn(n):n}{unit}</div>
          </div>
          <div style={{textAlign:"center",flex:1,borderLeft:`1px solid ${T.div}`,paddingLeft:10}}>
            <div style={{fontSize:9,color:T.lt,marginBottom:2}}>{better?"You save":"Impact"}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:700,color:better?T.a2:T.danger}}>{fmtFn?fmtFn(Math.abs(diff)):Math.abs(diff).toFixed(0)}{unit}</div>
          </div>
        </Row>
      </div>
    );
  };

  return(
    <div className="fade">
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:T.text}}>Scenario Planner</div>
        <div style={{fontSize:12,color:T.sub,marginTop:2}}>Model your financial future before it happens</div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:`${T.card}`,borderRadius:12,padding:4,border:`1px solid ${T.border}`,marginBottom:14,gap:3}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 4px",borderRadius:9,border:"none",background:tab===t.id?`${T.a}20`:"transparent",fontSize:11,fontWeight:tab===t.id?700:400,color:tab===t.id?T.a:T.lt,cursor:"pointer",transition:"all .2s"}}>
            {t.lbl}
          </button>
        ))}
      </div>

      {tab==="debt"&&(
        <div>
          <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
            <SL T={T}>Select Debt</SL>
            <select value={selDebt} onChange={e=>setSelDebt(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1.5px solid ${T.a}35`,background:T.card,color:T.text,fontSize:13,marginBottom:14,outline:"none",colorScheme:T.dark?"dark":"light"}}>
              {sorted.map(d=><option key={d.id} value={d.id}>{d.name} — {fmt(d.bal)} @ {d.apr}% APR</option>)}
            </select>
            {debt&&<>
              <SliderRow label="Extra monthly payment" val={extra} min={0} max={Math.min(5000,debt.bal)} step={50} onChange={setExtra} fmtFn={fmt}/>
              <div style={{background:`${T.a}08`,borderRadius:11,padding:"10px 12px",marginBottom:12,fontSize:12,color:T.sub,lineHeight:1.6}}>
                Current payment: {fmt(curPay)}/mo · New total: <span style={{fontWeight:700,color:T.a}}>{fmt(newPay)}/mo</span>
              </div>
              {/* Payoff date comparison — custom so we don't subtract date strings (which = NaN) */}
              <div style={{background:`${T.a2}0E`,borderRadius:11,padding:"11px 13px",border:`1.5px solid ${T.a2}25`,marginBottom:8}}>
                <div style={{fontSize:10,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Payoff Date</div>
                <Row>
                  <div style={{textAlign:"center",flex:1}}>
                    <div style={{fontSize:9,color:T.lt,marginBottom:2}}>Current pace</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:T.lt}}>{plbl(curMo)}</div>
                  </div>
                  <div style={{fontSize:18,color:T.a2}}>→</div>
                  <div style={{textAlign:"center",flex:1}}>
                    <div style={{fontSize:9,color:T.lt,marginBottom:2}}>With extra payment</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:T.a2}}>{plbl(newMo)}</div>
                  </div>
                  {isFinite(curMo)&&isFinite(newMo)&&moSaved>0&&(
                    <div style={{textAlign:"center",flex:1,borderLeft:`1px solid ${T.div}`,paddingLeft:10}}>
                      <div style={{fontSize:9,color:T.lt,marginBottom:2}}>Months sooner</div>
                      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.a2}}>{moSaved}</div>
                    </div>
                  )}
                </Row>
              </div>
              {isFinite(curMo)&&isFinite(newMo)&&<>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div style={{background:`${T.a2}10`,borderRadius:11,padding:"12px",border:`1px solid ${T.a2}20`,textAlign:"center"}}>
                    <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Months Saved</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:T.a2}}>{moSaved}</div>
                    <div style={{fontSize:11,color:T.lt}}>months sooner</div>
                  </div>
                  <div style={{background:`${T.a2}10`,borderRadius:11,padding:"12px",border:`1px solid ${T.a2}20`,textAlign:"center"}}>
                    <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Interest Saved</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:T.a2}}>{fmt(intSaved)}</div>
                    <div style={{fontSize:11,color:T.lt}}>total savings</div>
                  </div>
                </div>
                {moSaved>0&&<div style={{marginTop:10,padding:"10px 12px",background:`${T.a}08`,borderRadius:10,fontSize:11,color:T.sub,lineHeight:1.6}}>
                  💡 Adding just {fmt(extra)}/month to your {debt.name} payment saves you {moSaved} months and {fmt(intSaved)} in interest. That's a {Math.round(intSaved/extra/moSaved*12)}x return on every extra dollar.
                </div>}
                {extra>0&&!isShared&&(
                  <button onClick={()=>{if(confirm(`Apply ${fmt(newPay)}/mo as the new planned payment for ${debt.name} in your budget?`)){onImplement("extraPayment",{debtId:debt.id,newMin:newPay});}}}
                    style={{width:"100%",marginTop:10,padding:"11px",borderRadius:11,background:`linear-gradient(135deg,${T.a2}22,${T.a2}0C)`,border:`1.5px solid ${T.a2}45`,fontSize:13,fontWeight:700,color:T.a2,cursor:"pointer"}}>
                    ✓ Implement — Set {debt.name} payment to {fmt(newPay)}/mo
                  </button>
                )}
              </>}
            </>}
          </Card>
        </div>
      )}

      {tab==="income"&&(
        <div>
          <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
            <SL T={T}>Adjust Income Streams</SL>
            <div style={{fontSize:11,color:T.lt,marginBottom:10}}>Tap a stream to toggle it. When selected you can adjust the amount — set to $0 to simulate losing it entirely, or reduce it to model a pay cut.</div>
            {incCats.map(c=>{
              const active=lostIncome.includes(c.id);
              const original=budgets[c.id]||0;
              const adjVal=adjAmounts[c.id]!==undefined?adjAmounts[c.id]:"";
              return(
                <div key={c.id} style={{marginBottom:8}}>
                  <div
                    onClick={()=>setLostIncome(p=>active?p.filter(x=>x!==c.id):[...p,c.id])}
                    style={{padding:"9px 11px",borderRadius:10,background:active?`${T.danger}10`:T.card,border:`1px solid ${active?T.danger+"30":T.div}`,cursor:"pointer",transition:"all .2s",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:14}}>{c.ico}</span>
                      <span style={{fontSize:13,color:T.text,fontWeight:active?700:400}}>{c.lbl}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:12,fontWeight:700,color:active?T.danger:T.a2}}>{fmt(original)}/mo</span>
                      <div style={{width:18,height:18,borderRadius:"50%",border:`1.5px solid ${active?T.danger:T.div}`,background:active?T.danger:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {active&&<span style={{fontSize:10,color:"white",fontWeight:700}}>✓</span>}
                      </div>
                    </div>
                  </div>
                  {active&&(
                    <div style={{padding:"10px 12px",background:`${T.danger}06`,borderRadius:"0 0 10px 10px",border:`1px solid ${T.danger}20`,borderTop:"none",marginTop:-2}}>
                      <div style={{fontSize:10,color:T.lt,marginBottom:6}}>
                        Adjust to what amount? <span style={{color:T.danger}}>Current: {fmt(original)}/mo</span>
                      </div>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <div style={{position:"relative",flex:1}}>
                          <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:T.danger,fontWeight:700}}>$</span>
                          <input type="number" placeholder={`0 = fully lost, or enter reduced amount`}
                            value={adjVal}
                            onChange={e=>setAdjAmounts(a=>({...a,[c.id]:e.target.value}))}
                            style={{width:"100%",padding:"7px 8px 7px 22px",fontSize:14,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${T.danger}35`,borderRadius:9,background:`${T.danger}08`,color:T.text,outline:"none",boxSizing:"border-box"}}/>
                        </div>
                        <div style={{fontSize:11,color:T.danger,textAlign:"right",flexShrink:0}}>
                          {original>0&&<>-{fmt(original-(parseFloat(adjVal)||0))}/mo</>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6,marginTop:7}}>
                        {[0,original*0.25,original*0.5,original*0.75].map((v,i)=>(
                          <button key={i} onClick={()=>setAdjAmounts(a=>({...a,[c.id]:Math.round(v)}))}
                            style={{flex:1,padding:"4px 0",borderRadius:7,border:`1px solid ${T.danger}28`,background:parseFloat(adjVal)===Math.round(v)?`${T.danger}18`:"transparent",fontSize:10,color:T.danger,cursor:"pointer"}}>
                            {i===0?"$0":i===1?"−75%":i===2?"−50%":"−25%"}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </Card>
          <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <SL T={T} mb={0}>Add Income Streams</SL>
              <button onClick={addStream} style={{fontSize:11,fontWeight:700,color:T.a2,background:"none",border:`1px solid ${T.a2}40`,borderRadius:8,padding:"4px 10px",cursor:"pointer"}}>+ Add</button>
            </div>
            <div style={{fontSize:11,color:T.lt,marginBottom:10}}>Simulate adding new income (side hustle, new job, freelance, etc.)</div>
            {addedStreams.map((s,i)=>(
              <div key={s.id} style={{display:"flex",gap:7,alignItems:"center",marginBottom:8}}>
                <input value={s.lbl} onChange={e=>updateStream(s.id,"lbl",e.target.value)}
                  placeholder="Label (e.g. Freelance)" disabled={isShared}
                  style={{flex:1,padding:"7px 9px",fontSize:12,borderRadius:9,border:`1.5px solid ${T.a2}25`,background:`${T.a2}07`,color:T.text,outline:"none"}}/>
                <div style={{position:"relative",width:110}}>
                  <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:12,color:T.a2,fontWeight:700}}>$</span>
                  <input type="number" value={s.amt} onChange={e=>updateStream(s.id,"amt",e.target.value)}
                    placeholder="0" disabled={isShared}
                    style={{width:"100%",padding:"7px 7px 7px 20px",fontSize:13,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,borderRadius:9,border:`1.5px solid ${T.a2}28`,background:`${T.a2}09`,color:T.text,outline:"none",boxSizing:"border-box"}}/>
                </div>
                {addedStreams.length>1&&(
                  <button onClick={()=>removeStream(s.id)} style={{fontSize:14,color:T.danger,background:"none",border:"none",cursor:"pointer",flexShrink:0,opacity:.7}}>×</button>
                )}
              </div>
            ))}
            {addedAmt>0&&<div style={{marginTop:4,fontSize:11,color:T.a2,fontWeight:600}}>Total added: {fmt(addedAmt)}/mo across {addedStreams.filter(s=>s.amt).length} stream{addedStreams.filter(s=>s.amt).length!==1?"s":""}</div>}
          </Card>
          {/* Results */}
          <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
            <SL T={T}>Projected Impact</SL>
            <ResultBox label="Monthly Income" old={totInc} now={newIncome} good="higher" fmtFn={fmt}/>
            <ResultBox label="Monthly Cash Flow" old={totInc-moExpenses} now={newCashflow} good="higher" fmtFn={fmt}/>
            <ResultBox label="Cash Runway" old={parseFloat(runway.toFixed(1))} now={parseFloat(newRunway.toFixed(1))} good="higher" fmtFn={v=>v.toFixed(1)} unit=" mo"/>
            {newCashflow<0&&<div style={{padding:"10px 12px",background:`${T.danger}0C`,borderRadius:10,fontSize:11,color:T.sub,lineHeight:1.6,marginTop:6}}>
              ⚠️ At this income level you'd be spending {fmt(Math.abs(newCashflow))} more than you earn each month. You have roughly {newRunway.toFixed(1)} months of runway at current balances.
            </div>}
            {newCashflow>=0&&(lostAmt>0||addedAmt>0)&&<div style={{padding:"10px 12px",background:`${T.a2}0A`,borderRadius:10,fontSize:11,color:T.sub,lineHeight:1.6,marginTop:6}}>
              ✓ Cash flow remains positive at {fmt(newCashflow)}/month. You have {newRunway.toFixed(1)} months of runway.
            </div>}
          </Card>
          {/* Implement income changes */}
          {!isShared&&(lostAmt>0||addedAmt>0)&&(
            <button onClick={()=>{
              const adj=[];
              lostIncome.forEach(id=>{const c=incCats.find(x=>x.id===id);if(c){const newAmt=adjAmounts[id]!==undefined?parseFloat(adjAmounts[id])||0:0;adj.push({catId:id,newAmt});}});
              addedStreams.filter(s=>s.amt).forEach(s=>{adj.push({catId:"_new_"+s.id,newAmt:parseFloat(s.amt)||0,isNew:true,lbl:s.lbl});});
              if(confirm("Apply these income changes to your Budget tab?"))onImplement("incomeChange",{adjustments:adj});
            }}
              style={{width:"100%",marginBottom:14,padding:"11px",borderRadius:11,background:`linear-gradient(135deg,${T.a2}22,${T.a2}0C)`,border:`1.5px solid ${T.a2}45`,fontSize:13,fontWeight:700,color:T.a2,cursor:"pointer"}}>
              ✓ Implement — Apply income changes to Budget
            </button>
          )}
        </div>
      )}

      {tab==="windfall"&&(
        <div>
          <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
            <SL T={T}>Apply a Windfall / Bonus</SL>
            <div style={{position:"relative",marginBottom:14}}>
              <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:18,color:T.a,fontFamily:"'Cormorant Garamond',serif",fontWeight:700}}>$</span>
              <input type="number" placeholder="Lump sum amount" value={windfall||""} onChange={e=>setWindfall(parseFloat(e.target.value)||0)} disabled={isShared}
                style={{width:"100%",padding:"11px 12px 11px 28px",fontSize:22,fontFamily:"'Cormorant Garamond',serif",fontWeight:700,border:`1.5px solid ${T.a}35`,borderRadius:12,background:`${T.a}0E`,color:T.a,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <SL T={T}>Apply to Which Debt?</SL>
            <select value={winDebtId} onChange={e=>setWinDebtId(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1.5px solid ${T.a}35`,background:T.card,color:T.text,fontSize:13,outline:"none",colorScheme:T.dark?"dark":"light"}}>
              {sorted.map(d=><option key={d.id} value={d.id}>{d.name} — {fmt(d.bal)} @ {d.apr}% APR</option>)}
            </select>
          </Card>
          {windfall>0&&winDebt&&<>
            <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
              <SL T={T}>Impact</SL>
              <ResultBox label={`${winDebt.name} Balance`} old={winDebt.bal} now={Math.max(0,wAfter)} good="lower" fmtFn={fmt}/>
              {wAfter>0?<>
                {/* Custom payoff date row — avoids NaN from string subtraction */}
                <div style={{background:`${T.a2}0E`,borderRadius:11,padding:"11px 13px",border:`1.5px solid ${T.a2}25`,marginBottom:8}}>
                  <div style={{fontSize:10,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Payoff Date</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{flex:1,textAlign:"center"}}>
                      <div style={{fontSize:9,color:T.lt,marginBottom:2}}>Without windfall</div>
                      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:T.lt}}>{plbl(wMoNow)}</div>
                    </div>
                    <div style={{fontSize:18,color:T.a2}}>→</div>
                    <div style={{flex:1,textAlign:"center"}}>
                      <div style={{fontSize:9,color:T.lt,marginBottom:2}}>With windfall</div>
                      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:T.a2}}>{plbl(wMoAfter)}</div>
                    </div>
                    {isFinite(wMoNow)&&isFinite(wMoAfter)&&<div style={{flex:1,textAlign:"center",borderLeft:`1px solid ${T.div}`,paddingLeft:10}}>
                      <div style={{fontSize:9,color:T.lt,marginBottom:2}}>Months sooner</div>
                      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:T.a2}}>{Math.max(0,wMoNow-wMoAfter)}</div>
                    </div>}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:4}}>
                  <div style={{background:`${T.a2}10`,borderRadius:11,padding:"12px",border:`1px solid ${T.a2}20`,textAlign:"center"}}>
                    <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Months Saved</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:T.a2}}>{isFinite(wMoNow)&&isFinite(wMoAfter)?Math.max(0,wMoNow-wMoAfter):"∞"}</div>
                  </div>
                  <div style={{background:`${T.a2}10`,borderRadius:11,padding:"12px",border:`1px solid ${T.a2}20`,textAlign:"center"}}>
                    <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Interest Saved</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.a2}}>{fmt(wIntSaved)}</div>
                  </div>
                </div>
              </>:<div style={{padding:"12px",background:`${T.a2}12`,borderRadius:11,border:`1px solid ${T.a2}28`,textAlign:"center",marginTop:6}}>
                <div style={{fontSize:20,marginBottom:4}}>🎉</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:T.a2,marginBottom:3}}>{winDebt.name} would be PAID OFF!</div>
                <div style={{fontSize:12,color:T.sub}}>Your {fmt(windfall)} windfall completely eliminates this debt. Roll that {fmt(winDebt.min)}/month payment to your next highest APR debt.</div>
              </div>}
            </Card>
            <Card T={T} style={{padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:12,color:T.sub,lineHeight:1.7}}>
                💡 <strong>Pro tip:</strong> Applying windfalls to high-APR debt first (avalanche method) saves the most money. Your highest APR right now is {[...debts].sort((a,b)=>b.apr-a.apr)[0]?.name} at {[...debts].sort((a,b)=>b.apr-a.apr)[0]?.apr}%.
              </div>
            </Card>
            {!isShared&&windfall>0&&winDebt&&wAfter>0&&(
              <button onClick={()=>{if(confirm(`Apply ${fmt(windfall)} windfall to ${winDebt.name}? This will reduce the balance from ${fmt(winDebt.bal)} to ${fmt(Math.max(0,wAfter))}.`)){onImplement("windfall",{debtId:winDebt.id,amount:windfall});}}}
                style={{width:"100%",marginBottom:14,padding:"11px",borderRadius:11,background:`linear-gradient(135deg,${T.a2}22,${T.a2}0C)`,border:`1.5px solid ${T.a2}45`,fontSize:13,fontWeight:700,color:T.a2,cursor:"pointer"}}>
                ✓ Implement — Apply {fmt(windfall)} to {winDebt.name}
              </button>
            )}
          </>}
          {!windfall&&<div style={{textAlign:"center",padding:"20px",color:T.lt,fontSize:13}}>Enter an amount above to see the impact of a tax refund, bonus, or gift on your debts.</div>}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  MORE
// ════════════════════════════════════════════════════════════════
function More({T,accs,onAcc,onAddAcc,onDelAcc,totBal,notes,onNotes,onTheme,doExp,mo,yr,isShared,totDebt,userName,onName}){
  const shareUrl=`${window.location.origin}${window.location.pathname}?shared=true`;
  const [copied,setCopied]=useState(false);
  const curThemeKey=Object.keys(THEMES).find(k=>THEMES[k].name===T.name)||"bloom";
  function copyShare(){navigator.clipboard.writeText(shareUrl).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});}
  return(
    <div className="fade">
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:T.text}}>More</div>
        <div style={{fontSize:12,color:T.sub,marginTop:2}}>Accounts, notes, themes & settings</div>
      </div>

      {/* Notes */}
      <Card T={T} style={{padding:"15px 17px",marginBottom:13}}>
        <SL T={T}>📝 Monthly Notes — {MO[mo]} {yr}</SL>
        <textarea value={notes} onChange={e=>onNotes(e.target.value)} disabled={isShared}
          placeholder="Jot down anything notable — an unexpected expense, a bonus, why a category went over…"
          rows={4}
          style={{width:"100%",padding:"9px 11px",borderRadius:11,border:`1.5px solid ${T.a}26`,background:`${T.a}07`,fontSize:13,color:T.text,outline:"none",lineHeight:1.6,boxSizing:"border-box"}}/>
        {notes&&<div style={{fontSize:10,color:T.lt,marginTop:5,textAlign:"right"}}>Auto-saving…</div>}
      </Card>

      {/* Accounts */}
      <Row style={{marginBottom:10}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:T.text}}>🏦 Accounts</div>
        {!isShared&&<Btn T={T} onClick={onAddAcc} accent={T.a2} style={{padding:"5px 11px",fontSize:11}}>+ Add</Btn>}
      </Row>
      <Card T={T} style={{padding:"12px 16px",marginBottom:11,textAlign:"center"}}>
        <SL T={T} mb={4}>Combined Balance</SL>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:700,color:T.text}}>{fmtD(totBal)}</div>
      </Card>
      {Object.entries(accs).map(([k,a])=>(
        <div key={k} style={{background:T.card,borderRadius:17,padding:"14px 16px",border:`1.5px solid ${a.col}25`,marginBottom:11}}>
          <Row style={{marginBottom:11}}>
            <div style={{display:"flex",gap:5}}>
              {["checking","savings"].map(t=>(
                <button key={t} onClick={()=>!isShared&&onAcc(k,"type",t)} disabled={isShared}
                  style={{padding:"4px 10px",borderRadius:99,border:`1.5px solid ${a.col}${a.type===t?"50":"20"}`,background:a.type===t?`${a.col}20`:"transparent",fontSize:10,fontWeight:a.type===t?700:400,color:a.type===t?a.col:T.lt,cursor:isShared?"default":"pointer"}}>
                  {t==="checking"?"💳 Checking":"🏦 Savings"}
                </button>
              ))}
            </div>
            {!isShared&&<button onClick={()=>onDelAcc(k)} style={{fontSize:12,color:T.danger,background:"none",border:"none",cursor:"pointer",opacity:.7}}>Remove</button>}
          </Row>
          <div style={{marginBottom:9}}>
            <SL T={T} mb={4}>Account Name</SL>
            <input value={a.name} onChange={e=>onAcc(k,"name",e.target.value)} disabled={isShared}
              style={{width:"100%",padding:"7px 11px",borderRadius:9,border:`1.5px solid ${a.col}26`,background:`${a.col}08`,fontSize:13,fontWeight:600,color:T.text,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div>
            <SL T={T} mb={4}>Balance</SL>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:19,color:a.col,fontFamily:"'Cormorant Garamond',serif",fontWeight:600}}>$</span>
              <input type="number" step="0.01" value={a.bal||""} onChange={e=>onAcc(k,"bal",e.target.value)} disabled={isShared} placeholder="0.00"
                style={{width:"100%",padding:"9px 11px 9px 27px",borderRadius:11,border:`1.5px solid ${a.col}33`,background:`${a.col}0D`,fontSize:22,fontFamily:"'Cormorant Garamond',serif",fontWeight:700,color:a.col,outline:"none",boxSizing:"border-box"}}/>
            </div>
          </div>
        </div>
      ))}
      {!isShared&&<button onClick={onAddAcc} style={{width:"100%",padding:"9px",borderRadius:12,background:`${T.a2}09`,border:`1.5px dashed ${T.a2}36`,fontSize:12,fontWeight:700,color:T.a2,cursor:"pointer",marginBottom:13}}>+ Add Another Account</button>}

      {/* Export */}
      {!isShared&&<>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:T.text,marginBottom:9}}>📤 Export</div>
        <Card T={T} style={{padding:"14px 16px",marginBottom:13}}>
          <div style={{fontSize:12,color:T.sub,marginBottom:10,lineHeight:1.6}}>Download a CSV of {MO[mo]} {yr} — budget, goals, net worth, and your notes in one file.</div>
          <Btn T={T} full onClick={doExp} accent={T.a2}>⬇️ Download {MO[mo]} {yr} CSV</Btn>
        </Card>
      </>}

      {/* Themes */}
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:T.text,marginBottom:9}}>🎨 Themes</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:4}}>
        <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.12em",textAlign:"center",paddingBottom:4}}>☀️ Light</div>
        <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.12em",textAlign:"center",paddingBottom:4}}>🌙 Dark</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:4}}>
        <div style={{fontSize:9,color:T.lt,textAlign:"center",paddingBottom:2,opacity:.5}}>Warm palette</div>
        <div style={{fontSize:9,color:T.lt,textAlign:"center",paddingBottom:2,opacity:.5}}>Warm palette</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:6}}>
        {["bloom","midnight"].map(key=>{const th=THEMES[key];return(
          <button key={key} onClick={()=>!isShared&&onTheme(key)}
            style={{padding:"13px 10px",borderRadius:14,border:`2px solid ${curThemeKey===key?T.a:"transparent"}`,background:th.dark?"#1B1108":th.card,cursor:"pointer",textAlign:"center",position:"relative",overflow:"hidden",transition:"border-color .2s"}}>
            <div style={{display:"flex",gap:3,justifyContent:"center",marginBottom:7}}>
              {[th.a,th.a2,th.a3].map((c,i)=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:c}}/>)}
            </div>
            <div style={{fontSize:12,fontWeight:700,color:th.text,marginBottom:1}}>{th.name}</div>
            <div style={{fontSize:10,color:th.lt}}>{th.desc}</div>
            {curThemeKey===key&&<div style={{position:"absolute",top:6,right:8,fontSize:11,color:th.a,fontWeight:700}}>✓</div>}
          </button>
        );})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:4}}>
        <div style={{fontSize:9,color:T.lt,textAlign:"center",paddingBottom:2,opacity:.5}}>Neutral palette</div>
        <div style={{fontSize:9,color:T.lt,textAlign:"center",paddingBottom:2,opacity:.5}}>Neutral palette</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:13}}>
        {["stone","carbon"].map(key=>{const th=THEMES[key];return(
          <button key={key} onClick={()=>!isShared&&onTheme(key)}
            style={{padding:"13px 10px",borderRadius:14,border:`2px solid ${curThemeKey===key?T.a:"transparent"}`,background:th.dark?"#0D1117":th.card,cursor:"pointer",textAlign:"center",position:"relative",overflow:"hidden",transition:"border-color .2s"}}>
            <div style={{display:"flex",gap:3,justifyContent:"center",marginBottom:7}}>
              {[th.a,th.a2,th.a3].map((c,i)=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:c}}/>)}
            </div>
            <div style={{fontSize:12,fontWeight:700,color:th.text,marginBottom:1}}>{th.name}</div>
            <div style={{fontSize:10,color:th.lt}}>{th.desc}</div>
            {curThemeKey===key&&<div style={{position:"absolute",top:6,right:8,fontSize:11,color:th.a,fontWeight:700}}>✓</div>}
          </button>
        );})}
      </div>

      {/* Settings */}
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:T.text,marginBottom:9}}>⚙️ Settings</div>
      <Card T={T} style={{padding:"15px 16px",marginBottom:13}}>
        {!isShared&&<div style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:2}}>👤 Your Name</div>
          <div style={{fontSize:11,color:T.lt,marginBottom:7}}>Personalizes your dashboard greeting</div>
          <input value={userName} onChange={e=>onName(e.target.value)} placeholder="Enter your name…" maxLength={30}
            style={{width:"100%",padding:"8px 11px",borderRadius:10,border:`1.5px solid ${T.a}28`,background:`${T.a}08`,fontSize:13,color:T.text,outline:"none",boxSizing:"border-box"}}/>
        </div>}
        {!isShared&&<div style={{borderTop:`1px solid ${T.div}`,paddingTop:13}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:2}}>🔗 Partner / Shared View</div>
          <div style={{fontSize:11,color:T.lt,marginBottom:9,lineHeight:1.6}}>Share a read-only link — your partner sees everything but can't edit.</div>
          <Btn T={T} full onClick={copyShare} accent={copied?T.a2:T.a} style={{marginBottom:6}}>{copied?"✓ Link Copied!":"📋 Copy Share Link"}</Btn>
          <div style={{fontSize:9,color:T.lt,textAlign:"center",wordBreak:"break-all",opacity:.6}}>{shareUrl}</div>
        </div>}
      </Card>
      <div style={{textAlign:"center",fontSize:11,color:T.lt,lineHeight:1.9,marginBottom:20}}>
        💗 All data syncs automatically across your devices.<br/>Built with care for your financial journey.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
