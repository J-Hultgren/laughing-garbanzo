// ── Math helpers ──────────────────────────────────────────────────
function pmts(bal,apr,pay){
  if(bal<=0)return 0;if(pay<=0)return Infinity;
  if(apr===0)return Math.ceil(bal/pay);
  const r=apr/100/12;if(pay<=bal*r)return Infinity;
  return Math.ceil(Math.log(pay/(pay-bal*r))/Math.log(1+r));
}
function totalInterest(bal,apr,pay){
  if(bal<=0||pay<=0)return 0;
  const m=pmts(bal,apr,pay);
  if(!isFinite(m))return Infinity;
  return Math.max(0,pay*m-bal);
}
function plbl(m){
  if(!isFinite(m)||m>600)return"Never at this rate";
  const d=new Date();d.setMonth(d.getMonth()+m);
  return d.toLocaleDateString("en-US",{month:"short",year:"numeric"});
}
function calcHealthScore(cats,budgets,actuals,debts,accs,totInc,totBal){
  let score=0, details=[];
  // 1. Debt-to-income (25 pts)
  const minDebt=debts.reduce((s,d)=>s+d.min,0);
  const dti=totInc>0?minDebt/totInc:1;
  const dtiPts=dti<0.15?25:dti<0.20?20:dti<0.30?14:dti<0.40?7:0;
  score+=dtiPts;
  details.push({lbl:"Debt Load",pts:dtiPts,max:25,note:dti<0.15?"Excellent":dti<0.30?"Manageable":"High — focus here",icon:"💳"});
  // 2. Savings rate (25 pts)
  const savBud=cats.filter(c=>c.g==="savings").reduce((s,c)=>s+(budgets[c.id]||0),0);
  const savRate=totInc>0?savBud/totInc:0;
  const savPts=savRate>0.20?25:savRate>0.15?20:savRate>0.10?15:savRate>0.05?10:3;
  score+=savPts;
  details.push({lbl:"Savings Rate",pts:savPts,max:25,note:`${Math.round(savRate*100)}% of income — ${savRate>0.15?"great":"aim for 15%+"}`,icon:"🌱"});
  // 3. Cash cushion (20 pts)
  const moExpenses=cats.filter(c=>!c.inc).reduce((s,c)=>s+(budgets[c.id]||0),0);
  const months=moExpenses>0?totBal/moExpenses:0;
  const cushPts=months>6?20:months>3?16:months>1?10:months>0.5?5:0;
  score+=cushPts;
  details.push({lbl:"Cash Cushion",pts:cushPts,max:20,note:`${months.toFixed(1)} months of expenses — ${months>3?"solid":"build to 3 months+"}`,icon:"🏦"});
  // 4. Budget adherence (15 pts)
  const totBud=cats.filter(c=>!c.inc).reduce((s,c)=>s+(budgets[c.id]||0),0);
  const totAct=cats.filter(c=>!c.inc).reduce((s,c)=>s+(actuals[c.id]||0),0);
  const over=totBud>0?(totAct-totBud)/totBud:0;
  const budPts=over<0.05?15:over<0.10?10:over<0.20?5:0;
  score+=budPts;
  details.push({lbl:"Budget Adherence",pts:budPts,max:15,note:over<0.05?"On track":over<0.20?"Slightly over":"Needs attention",icon:"📋"});
  // 5. Income diversity (15 pts)
  const incCount=cats.filter(c=>c.inc&&(budgets[c.id]||0)>0).length;
  const divPts=incCount>=3?15:incCount===2?12:incCount===1?8:0;
  score+=divPts;
  details.push({lbl:"Income Diversity",pts:divPts,max:15,note:`${incCount} stream${incCount!==1?"s":""} — ${incCount>=2?"well diversified":"add more streams"}`,icon:"💼"});
  const grade=score>=85?"Excellent 🏆":score>=70?"Great 💚":score>=55?"Good 👍":score>=40?"Fair ⚠️":"Needs Work 🔧";
  return{score,grade,details};
}
function calc5030(cats,budgets){
  let needs=0,wants=0,savings=0;
  cats.filter(c=>!c.inc).forEach(c=>{
    const v=budgets[c.id]||0;
    const grpSplit=GRP[c.g]?.split;
    const split=c.split||grpSplit;
    if(split==="needs")needs+=v;
    else if(split==="savings")savings+=v;
    else wants+=v;
  });
  return{needs,wants,savings};
}

// ── Zillow ────────────────────────────────────────────────────────
async function fetchZillow(address){
  try{
    const proxy=`https://api.allorigins.win/raw?url=${encodeURIComponent("https://www.zillow.com/homes/"+encodeURIComponent(address.trim())+"_rb/")}`;
    const resp=await fetch(proxy,{signal:AbortSignal.timeout(9000)});
    if(!resp.ok)return null;
    const html=await resp.text();
    const m=html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
    if(m){
      const s=JSON.stringify(JSON.parse(m[1]));
      for(const p of[/"zestimate":(\d{5,})/,/"homeEstimate":(\d{5,})/,/"price":(\d{5,})/]){
        const f=s.match(p);if(f){const v=parseInt(f[1]);if(v>50000&&v<20000000)return v;}
      }
    }
    return null;
  }catch{return null;}
}

// ── Export ────────────────────────────────────────────────────────
function doExport(cats,budgets,actuals,goals,assets,totDebt,mo,yr,notes){
  const r=[[`Budget Planner — ${MO[mo]} ${yr}`],[],["BUDGET"],["Category","Group","Planned","Actual","Diff"]];
  Object.entries(GRP).forEach(([gid,g])=>cats.filter(c=>c.g===gid).forEach(c=>{
    const b=budgets[c.id]||0,a=actuals[c.id]||0;r.push([c.lbl,g.lbl,b,a,a-b]);
  }));
  if(goals.length){r.push([],["SAVINGS GOALS"],["Goal","Target","Saved","Monthly","% Done"]);
    goals.forEach(g=>r.push([g.name,g.target,g.saved,g.monthly,Math.round((g.saved/g.target)*100)+"%"]));}
  r.push([],["NET WORTH"],["Item","Value"]);
  assets.forEach(a=>r.push([a.name,a.val]));
  r.push(["Total Liabilities",-totDebt],["NET WORTH",assets.reduce((s,a)=>s+a.val,0)-totDebt]);
  if(notes)r.push([],["MONTHLY NOTES"],[notes]);
  const csv=r.map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`budget-${yr}-${String(mo+1).padStart(2,"0")}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

);
const SL=({T,children,mb=12})=>( // Section label
  <div style={{fontSize:10,letterSpacing:"0.14em",textTransform:"uppercase",color:T.lt,marginBottom:mb}}>{children}</div>
);
const Row=({children,style={},onClick})=>(
  <div onClick={onClick} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:onClick?"pointer":"default",...style}}>{children}</div>
);
const Btn=({T,children,onClick,style={},accent,outline,full,disabled})=>{
  const c=accent||T.a;
  return(
    <button onClick={onClick} disabled={disabled}
      style={{width:full?"100%":undefined,padding:"9px 16px",borderRadius:11,border:`1.5px solid ${c}${outline?"50":"30"}`,
        background:outline?`${c}10`:`${c}20`,fontSize:13,fontWeight:700,color:c,cursor:disabled?"default":"pointer",
        opacity:disabled?.45:1,transition:"all .15s",...style}}>
      {children}
    </button>
  );
};

// ── Debt name alias map — handles mismatches between debt name & budget cat label ──
const DEBT_ALIASES={
  "american express":"p_ax","amex":"p_ax","american express card":"p_ax",
  "avant":"p_av",
  "sofi":"p_sf","sofi loan":"p_sf","sofi personal loan":"p_sf",
  "upstart":"p_up",
  "upgrade":"p_ug",
  "best egg":"p_be","bestegg":"p_be",
  "affirm":"p_af",
  "barclay":"p_ba","barclaycard":"p_ba","barclays":"p_ba",
  "citi aa":"p_ca","citi aadvantage":"p_ca","citi aa - pp":"p_ca",
  "citi":"p_ci","citibank":"p_ci","citi - pp":"p_ci",
  "scu equity loan":"p_sc_eq","scu equity":"p_sc_eq","scu home equity":"p_sc_eq",
  "mortgage":"mort",
};
function resolveDebtCatId(debtName,cats){
  const key=(debtName||"").toLowerCase().trim();
  if(!key)return null;
  if(DEBT_ALIASES[key])return DEBT_ALIASES[key];
  const exact=cats.find(c=>c.g==="debt"&&c.lbl.toLowerCase().trim()===key);
  if(exact)return exact.id;
  const partial=cats.find(c=>c.g==="debt"&&(c.lbl.toLowerCase().includes(key)||key.includes(c.lbl.toLowerCase())));
  return partial?.id||null;
}

// ════════════════════════════════════════════════════════════════
//  APP
// ════════════════════════════════════════════════════════════════
function App(){
  const now=new Date();
  const [theme,setTheme]=useState(()=>THEMES[localStorage.getItem("budTheme")||"bloom"]);
  const T=theme;
  const [page,setPageRaw]=useState("focus");
  const [scenarioTab,setScenarioTab]=useState("debt");
  function setPage(p,subTab){setPageRaw(p);if(subTab)setScenarioTab(subTab);}
  const [mo,setMo]=useState(now.getMonth());
  const [yr,setYr]=useState(now.getFullYear());
  const [sync,setSync]=useState("idle");
  const [loading,setLoad]=useState(true);
  const [userName,setUserName]=useState(()=>localStorage.getItem("budName")||"");
  const [focusMode,setFocusMode]=useState(()=>localStorage.getItem("budFocus")||"debt");
  const tmr=useRef({});

  const initB=useCallback(cl=>Object.fromEntries(cl.map(c=>[c.id,c.def])),[]);
  const [cats,setCats]=useState(()=>CATS0.map(c=>({...c})));
  const [budgets,setBudgets]=useState(()=>initB(CATS0));
  const [actuals,setActuals]=useState({});
  const [irregIncome,setIrregIncome]=useState(false);
  const [pastIncome,setPastIncome]=useState({m1:"",m2:"",m3:""});
  const [debts,setDebts]=useState(DEBTS0);
  const [dpays,setDpays]=useState({});
  const [editD,setEditD]=useState(null);
  const [newPay,setNewPay]=useState({did:"",amt:"",note:"",date:""});
  const [showAddD,setShowAddD]=useState(false);
  const [ndf,setNdf]=useState({name:"",bal:"",apr:"",min:""});
  const [accs,setAccs]=useState(ACCS0);
  const [assets,setAssets]=useState(ASSETS0);
  const [goals,setGoals]=useState([]);
  const [goalPays,setGoalPays]=useState({});
  const [notes,setNotes]=useState("");
  const [nwHist,setNwHist]=useState([]);

  useEffect(()=>{load();},[mo,yr]);
  async function load(){
    setLoad(true);
    try{
      const[bR,dR,pR,aR,cR,gR,nR,asR,nwR,gpR,irR]=await Promise.all([
        dbGet(`bud-${yr}-${mo}`),dbGet("debts-v1"),dbGet(`dpay-${yr}-${mo}`),
        dbGet("accs-v1"),dbGet("cats-v2"),dbGet("goals-v2"),
        dbGet(`notes-${yr}-${mo}`),dbGet("assets-v1"),dbGet("nw-hist-v1"),
        dbGet(`gpay-${yr}-${mo}`),dbGet("irrinc-v1"),
      ]);
      const lc=cR?.budgets?.cats||CATS0.map(c=>({...c}));setCats(lc);
      const savedB=bR?.budgets||{},savedA=bR?.actuals||{};
      setBudgets({...initB(lc),...savedB});
      setActuals(savedA);  // never pre-fill actuals — new months start blank

      // Load debts — restore catId using alias map + name matching for any debt missing it
      if(dR?.budgets?.d){
        const restored=dR.budgets.d.map(d=>{
          if(d.catId)return d;
          const catId=resolveDebtCatId(d.name,lc);
          return catId?{...d,catId}:d;
        });
        setDebts(restored);
        if(restored.some((d,i)=>d.catId!==dR.budgets.d[i]?.catId)){
          setTimeout(()=>sD(restored),1000);
        }
      }

      setDpays(pR?.budgets?.p||{});
      if(aR?.budgets?.a)setAccs(aR.budgets.a);
      if(gR?.budgets?.g)setGoals(gR.budgets.g);
      setNotes(nR?.budgets?.notes||"");
      if(asR?.budgets?.as)setAssets(asR.budgets.as);
      if(nwR?.budgets?.h)setNwHist(nwR.budgets.h);
      setGoalPays(gpR?.budgets?.p||{});
      if(irR?.budgets?.ir){setIrregIncome(irR.budgets.ir.on||false);setPastIncome(irR.budgets.ir.past||{m1:"",m2:"",m3:""});}
    }catch(e){console.error(e);}
    setLoad(false);
  }

  const sv=useCallback((k,fn)=>{
    clearTimeout(tmr.current[k]);
    tmr.current[k]=setTimeout(async()=>{setSync("saving");try{await fn();setSync("saved");setTimeout(()=>setSync("idle"),2500);}catch{setSync("error");}},700);
  },[]);

  const sB=(b,a)=>sv("b",()=>dbSet(`bud-${yr}-${mo}`,{month:mo,year:yr,budgets:b,actuals:a}));
  const sD=d=>sv("d",()=>dbSet("debts-v1",{budgets:{d}}));
  const sP=p=>sv("p",()=>dbSet(`dpay-${yr}-${mo}`,{month:mo,year:yr,budgets:{p}}));
  const sA=a=>sv("a",()=>dbSet("accs-v1",{budgets:{a}}));
  const sCats=c=>sv("c",()=>dbSet("cats-v2",{budgets:{cats:c}}));
  const sGoals=g=>sv("g",()=>dbSet("goals-v2",{budgets:{g}}));
  const sNotes=n=>sv("n",()=>dbSet(`notes-${yr}-${mo}`,{month:mo,year:yr,budgets:{notes:n}}));
  const sAssets=as=>sv("as",()=>dbSet("assets-v1",{budgets:{as}}));
  const sNwHist=h=>sv("nw",()=>dbSet("nw-hist-v1",{budgets:{h}}));
  const sGP=p=>sv("gp",()=>dbSet(`gpay-${yr}-${mo}`,{month:mo,year:yr,budgets:{p}}));
  const sIR=v=>sv("ir",()=>dbSet("irrinc-v1",{budgets:{ir:v}}));

  // Irregular income
  const effectiveIncome=useMemo(()=>{
    if(!irregIncome)return null;
    const v=[pastIncome.m1,pastIncome.m2,pastIncome.m3].map(x=>parseFloat(x)||0);
    const filled=v.filter(x=>x>0);
    return filled.length?filled.reduce((s,x)=>s+x,0)/filled.length:null;
  },[irregIncome,pastIncome]);

  function onB(id,v){
    const val=parseFloat(v)||0;
    const b={...budgets,[id]:val};
    setBudgets(b);sB(b,actuals);
    // Only sync to Debts tab when editing a debt-payment category
    const cat=cats.find(c=>c.id===id);
    if(cat?.g!=="debt")return;
    const linked=debts.find(d=>d.catId===id)||debts.find(d=>resolveDebtCatId(d.name,cats)===id);
    if(linked){
      const nd=debts.map(d=>d.id===linked.id?{...d,min:val,catId:id}:d);
      setDebts(nd);sD(nd);
    }
  }
  // Helper: when a debt-category actual changes, keep exactly ONE "Via Budget tab" entry in dpays
  function syncDebtPayment(catId, newTotal){
    const cat=cats.find(c=>c.id===catId);
    if(cat?.g!=="debt")return;
    const linked=debts.find(d=>d.catId===catId)||debts.find(d=>resolveDebtCatId(d.name,cats)===catId);
    if(!linked)return;
    // Find any existing "Via Budget tab" entry to update in place
    const existing=dpays[linked.id]||[];
    const budgetIdx=existing.findIndex(e=>e.note==="Via Budget tab");
    const oldBudgetAmt=budgetIdx>=0?existing[budgetIdx].amt:0;
    // All manually-logged payments this month (excluding the budget-tab entry)
    const manualTotal=existing.filter((_,i)=>i!==budgetIdx).reduce((s,e)=>s+e.amt,0);
    // The budget-tab entry should equal: newTotal - manualTotal (clamped to 0)
    const budgetAmt=Math.max(0,newTotal-manualTotal);
    let updated;
    if(budgetAmt===0){
      // Remove the budget-tab entry entirely if nothing left to attribute
      updated=existing.filter((_,i)=>i!==budgetIdx);
    }else if(budgetIdx>=0){
      // Update existing entry in place — no new line
      updated=existing.map((e,i)=>i===budgetIdx?{...e,amt:budgetAmt,date:new Date().toISOString()}:e);
    }else{
      // First time: add one entry
      updated=[...existing,{amt:budgetAmt,date:new Date().toISOString(),note:"Via Budget tab"}];
    }
    const p={...dpays,[linked.id]:updated};
    setDpays(p);sP(p);
    // Adjust debt balance by the change in the budget-tab portion only
    const delta=budgetAmt-oldBudgetAmt;
    if(delta!==0){
      const nd=debts.map(d=>d.id===linked.id?{...d,bal:Math.max(0,d.bal-delta),catId}:d);
      setDebts(nd);sD(nd);
    }
  }
  function onA(id,v){
    const val=parseFloat(v)||0;
    const a={...actuals,[id]:val};
    setActuals(a);sB(budgets,a);
    syncDebtPayment(id,val);
  }
  function onQuickAdd(id,amt){
    const add=parseFloat(amt)||0;
    const val=(actuals[id]||0)+add;
    const a={...actuals,[id]:val};
    setActuals(a);sB(budgets,a);
    syncDebtPayment(id,val);
  }
  function onCatLbl(id,v){const nc=cats.map(c=>c.id===id?{...c,lbl:v}:c);setCats(nc);sCats(nc);}
  function onCatIco(id,v){const nc=cats.map(c=>c.id===id?{...c,ico:v}:c);setCats(nc);sCats(nc);}
  function onCatRec(id){const nc=cats.map(c=>c.id===id?{...c,rec:!c.rec}:c);setCats(nc);sCats(nc);}
  function onCatDel(id){if(!confirm("Remove?"))return;const nc=cats.filter(c=>c.id!==id);const nb={...budgets};delete nb[id];const na={...actuals};delete na[id];setCats(nc);setBudgets(nb);setActuals(na);sCats(nc);sB(nb,na);}
  function onCatAdd(grp){const id="c"+Date.now();const nc=[...cats,{id,lbl:"New Item",ico:"📌",g:grp,def:0,inc:grp==="income",rec:false}];const nb={...budgets,[id]:0};setCats(nc);setBudgets(nb);sCats(nc);sB(nb,actuals);}
  function onDE(d){
    const nd=debts.map(x=>x.id===d.id?d:x);
    setDebts(nd);sD(nd);
    // Find the linked budget cat — by catId first, then by name
    const catId=d.catId||resolveDebtCatId(d.name,cats);
    if(catId){
      const nb={...budgets,[catId]:d.min};
      setBudgets(nb);sB(nb,actuals);
      const nc=cats.map(c=>c.id===catId?{...c,lbl:d.name}:c);
      setCats(nc);sCats(nc);
      // Stamp catId back onto debt if it was missing
      if(!d.catId){const nd2=nd.map(x=>x.id===d.id?{...x,catId}:x);setDebts(nd2);sD(nd2);}
    }
  }
  function onDD(id){
    if(!confirm("Delete debt?"))return;
    const debt=debts.find(x=>x.id===id);
    const nd=debts.filter(x=>x.id!==id);setDebts(nd);sD(nd);
    // Clear dpays for this debt
    const{[id]:_removed,...restPays}=dpays;
    setDpays(restPays);sP(restPays);
    // Find linked budget cat — by catId first, then alias/name match
    const catId=debt?.catId||resolveDebtCatId(debt?.name||"",cats);
    if(catId){
      const nc=cats.filter(c=>c.id!==catId);
      const nb={...budgets};delete nb[catId];
      const na={...actuals};delete na[catId];
      setCats(nc);setBudgets(nb);setActuals(na);
      sCats(nc);sB(nb,na);
    }
  }
  function onAddDebt(){
    if(!ndf.name)return;
    const catId="p_"+Date.now();
    const min=parseFloat(ndf.min)||0;
    // Add budget category for new debt
    const nc=[...cats,{id:catId,lbl:ndf.name,ico:"💳",g:"debt",def:min,rec:true}];
    const nb={...budgets,[catId]:min};
    const nd=[...debts,{id:"d"+Date.now(),name:ndf.name,bal:parseFloat(ndf.bal)||0,apr:parseFloat(ndf.apr)||0,min,col:"#D4CABC",ord:debts.length+1,catId}];
    setCats(nc);setBudgets(nb);setDebts(nd);
    sCats(nc);sB(nb,actuals);sD(nd);
    setNdf({name:"",bal:"",apr:"",min:""});setShowAddD(false);
  }
  function onPay(){
    if(!newPay.did||!newPay.amt)return;
    const amt=parseFloat(newPay.amt)||0;
    const p={...dpays,[newPay.did]:[...(dpays[newPay.did]||[]),{amt,date:newPay.date||new Date().toISOString(),note:newPay.note}]};
    setDpays(p);sP(p);
    // Reduce debt balance
    const nd=debts.map(d=>d.id===newPay.did?{...d,bal:Math.max(0,d.bal-amt)}:d);
    setDebts(nd);sD(nd);
    // Sync total paid this month → budget actual for the linked category
    const debt=debts.find(d=>d.id===newPay.did);
    const catId=debt?.catId||resolveDebtCatId(debt?.name||"",cats);
    if(catId){
      const totalPaid=(p[newPay.did]||[]).reduce((s,x)=>s+x.amt,0);
      const na={...actuals,[catId]:totalPaid};
      setActuals(na);sB(budgets,na);
      // Stamp catId back on debt if missing so future calls use the fast path
      if(!debt?.catId){const nd2=nd.map(d=>d.id===newPay.did?{...d,catId}:d);setDebts(nd2);sD(nd2);}
    }
    setNewPay({did:"",amt:"",note:"",date:""});
  }
  function onDelPay(debtId,idx){
    const pays=dpays[debtId]||[];
    const removed=pays[idx];
    if(!removed)return;
    // Remove entry from dpays
    const updated=pays.filter((_,i)=>i!==idx);
    const p={...dpays,[debtId]:updated};
    setDpays(p);sP(p);
    // Restore debt balance (add the amount back)
    const nd=debts.map(d=>d.id===debtId?{...d,bal:d.bal+removed.amt}:d);
    setDebts(nd);sD(nd);
    // Also restore the budget actual if linked
    const debt=debts.find(d=>d.id===debtId);
    const catId=debt?.catId||resolveDebtCatId(debt?.name||"",cats);
    if(catId){
      const newTotal=updated.reduce((s,x)=>s+x.amt,0);
      const na={...actuals,[catId]:newTotal};
      setActuals(na);sB(budgets,na);
    }
  }
  // Implement scenario changes into real data
  function onImplement(type,payload){
    if(type==="extraPayment"){
      // Update debt min payment and budget planned amount
      const nd=debts.map(d=>d.id===payload.debtId?{...d,min:payload.newMin}:d);setDebts(nd);sD(nd);
      const debt=debts.find(d=>d.id===payload.debtId);
      if(debt?.catId){const nb={...budgets,[debt.catId]:payload.newMin};setBudgets(nb);sB(nb,actuals);}
    }else if(type==="windfall"){
      // Apply lump sum to debt balance
      const nd=debts.map(d=>d.id===payload.debtId?{...d,bal:Math.max(0,d.bal-payload.amount)}:d);setDebts(nd);sD(nd);
    }else if(type==="incomeChange"){
      // Apply income adjustments to budget planned amounts
      let nb={...budgets};
      payload.adjustments.forEach(({catId,newAmt})=>{nb={...nb,[catId]:newAmt};});
      setBudgets(nb);sB(nb,actuals);
    }
  }
  function onAcc(k,f,v){const a={...accs,[k]:{...accs[k],[f]:f==="bal"?parseFloat(v)||0:v}};setAccs(a);sA(a);}
  function onAddAcc(){const id="acc"+Date.now();const col=ACC_COLS[Object.keys(accs).length%ACC_COLS.length];const a={...accs,[id]:{name:"New Account",bal:0,col,type:"checking"}};setAccs(a);sA(a);}
  function onDelAcc(k){if(!confirm("Remove?"))return;const{[k]:_,...rest}=accs;setAccs(rest);sA(rest);}
  function onGoalEdit(g){const ng=goals.map(x=>x.id===g.id?g:x);setGoals(ng);sGoals(ng);}
  function onGoalDel(id){if(!confirm("Delete goal?"))return;const ng=goals.filter(x=>x.id!==id);setGoals(ng);sGoals(ng);}
  function onGoalAdd(g){const ng=[...goals,g];setGoals(ng);sGoals(ng);}
  function onGoalPay(gid,amt,note,date){
    const p={...goalPays,[gid]:[...(goalPays[gid]||[]),{amt,date:date||new Date().toISOString(),note}]};
    setGoalPays(p);sGP(p);
    const ng=goals.map(g=>g.id===gid?{...g,saved:Math.min(g.target,g.saved+amt)}:g);setGoals(ng);sGoals(ng);
  }
  function onAssetVal(id,v){const as=assets.map(a=>a.id===id?{...a,val:parseFloat(v)||0}:a);setAssets(as);sAssets(as);}
  function onAssetName(id,v){const as=assets.map(a=>a.id===id?{...a,name:v}:a);setAssets(as);sAssets(as);}
  function onAssetUpdate(id,ch){const as=assets.map(a=>a.id===id?{...a,...ch}:a);setAssets(as);sAssets(as);}
  function onAddAsset(type="other"){const t=ASSET_TYPES[type]||ASSET_TYPES.other;const as=[...assets,{id:"a"+Date.now(),name:t.lbl,val:0,ico:t.ico,type,address:""}];setAssets(as);sAssets(as);}
  function onDelAsset(id){const as=assets.filter(a=>a.id!==id);setAssets(as);sAssets(as);}
  function saveNwSnap(nw){const h=[...nwHist.filter(h=>!(h.mo===mo&&h.yr===yr)),{mo,yr,nw}].sort((a,b)=>a.yr!==b.yr?a.yr-b.yr:a.mo-b.mo).slice(-12);setNwHist(h);sNwHist(h);}
  function onTheme(key){const t=THEMES[key];setTheme(t);localStorage.setItem("budTheme",key);}
  function onName(v){setUserName(v);localStorage.setItem("budName",v);}
  function onFocus(v){setFocusMode(v);localStorage.setItem("budFocus",v);}
  function onNotes(v){setNotes(v);sNotes(v);}
  function onIrreg(on,past){setIrregIncome(on);setPastIncome(past);sIR({on,past});}

  const totInc=useMemo(()=>{
    if(irregIncome&&effectiveIncome)return effectiveIncome;
    return cats.filter(c=>c.inc).reduce((s,c)=>s+(budgets[c.id]||0),0);
  },[cats,budgets,irregIncome,effectiveIncome]);
  const totBud=useMemo(()=>cats.filter(c=>!c.inc).reduce((s,c)=>s+(budgets[c.id]||0),0),[cats,budgets]);
  const totAct=useMemo(()=>cats.filter(c=>!c.inc).reduce((s,c)=>s+(actuals[c.id]||0),0),[cats,actuals]);
  const totDebt=useMemo(()=>debts.reduce((s,d)=>s+d.bal,0),[debts]);
  const totBal=useMemo(()=>Object.values(accs).reduce((s,a)=>s+(a.bal||0),0),[accs]);
  const totAssets=useMemo(()=>assets.reduce((s,a)=>s+a.val,0),[assets]);
  const netWorth=totAssets-totDebt;
  const healthScore=useMemo(()=>calcHealthScore(cats,budgets,actuals,debts,accs,totInc,totBal),[cats,budgets,actuals,debts,accs,totInc,totBal]);
  const split5030=useMemo(()=>calc5030(cats,budgets),[cats,budgets]);

  const sl={idle:"",saving:"Saving…",saved:"✓ Synced",error:"⚠ Error"}[sync];
  const sc={idle:"transparent",saving:T.a,saved:T.a2,error:T.danger}[sync];
  const NAV=[{id:"focus",lbl:"Focus",ico:"🎯"},{id:"bud",lbl:"Budget",ico:"📋"},{id:"debt",lbl:"Debts",ico:"💳"},{id:"goals",lbl:"Goals",ico:"⭐"},{id:"scenarios",lbl:"Scenarios",ico:"🔮"},{id:"more",lbl:"More",ico:"⚙️"}];

  const P={T,cats,budgets,actuals,debts,dpays,accs,assets,goals,goalPays,notes,nwHist,
    totInc,totBud,totAct,totDebt,totBal,totAssets,netWorth,healthScore,split5030,
    mo,yr,userName,focusMode,irregIncome,pastIncome,effectiveIncome,
    onB,onA,onQuickAdd,onCatLbl,onCatIco,onCatRec,onCatDel,onCatAdd,
    onDE,onDD,onPay,onDelPay,newPay,setNewPay,editD,setEditD,showAddD,setShowAddD,ndf,setNdf,onAddDebt,onImplement,
    onAcc,onAddAcc,onDelAcc,onGoalEdit,onGoalDel,onGoalAdd,onGoalPay,
    onAssetVal,onAssetName,onAssetUpdate,onAddAsset,onDelAsset,
    saveNwSnap,onTheme,onName,onFocus,onNotes,onIrreg,isShared:IS_SHARED,setPage,scenarioTab,setScenarioTab,
    doExp:()=>doExport(cats,budgets,actuals,goals,assets,totDebt,mo,yr,notes)};

  return(
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:"'Lato',sans-serif",color:T.text,overflowX:"hidden",paddingBottom:92,transition:"background .3s,color .3s"}}>
      <div style={{position:"fixed",top:-80,right:-80,width:260,height:260,borderRadius:"60% 40% 70% 30%/50% 60% 40% 50%",background:`radial-gradient(circle,${T.a}28 0%,transparent 70%)`,pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",bottom:-60,left:-60,width:240,height:240,borderRadius:"40% 60% 30% 70%/60% 40% 50% 50%",background:`radial-gradient(circle,${T.a2}20 0%,transparent 70%)`,pointerEvents:"none",zIndex:0}}/>
      {IS_SHARED&&<div style={{background:`${T.a}22`,borderBottom:`1px solid ${T.a}30`,padding:"8px 16px",textAlign:"center",fontSize:12,color:T.a,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>👁 View Only — Partner Dashboard</div>}
      <div style={{position:"sticky",top:IS_SHARED?33:0,zIndex:20,background:T.hdr,backdropFilter:"blur(14px)",borderBottom:`1px solid ${T.div}`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:T.text}}>My Budget</div>
          <div style={{fontSize:9,color:T.lt,letterSpacing:"0.12em",textTransform:"uppercase"}}>{MO[mo]} {yr}</div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {!IS_SHARED&&<>

            <button onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}} style={{background:`${T.a}18`,border:`1px solid ${T.a}28`,borderRadius:8,padding:"4px 10px",fontSize:14,color:T.a,cursor:"pointer"}}>›</button>

          :page==="bud"      ?<Bud         {...P}/>
          :page==="debt"     ?<Dbt         {...P}/>

      {!IS_SHARED&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:20,background:T.nav,backdropFilter:"blur(14px)",borderTop:`1px solid ${T.div}`,display:"flex",padding:"6px 0 16px"}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}>

              {page===n.id&&<div style={{width:16,height:2,background:T.a,borderRadius:99}}/>}

          ))}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  FOCUS PAGE
// ════════════════════════════════════════════════════════════════
function FocusPage({T,cats,budgets,actuals,debts,dpays,accs,goals,split5030,healthScore,totInc,totBud,totAct,totDebt,totBal,totAssets,netWorth,mo,yr,userName,focusMode,onFocus,isShared,nwHist,setPage}){
  const {text:greetText,emoji:greetEmoji}=getGreeting(userName);
  const quote=QUOTES[mo];
  const rem=totInc-totAct;
  const pct=totInc>0?Math.min(totAct/totInc*100,100):0;
  const top3debts=[...debts].sort((a,b)=>b.apr-a.apr).slice(0,3);
  const totInt=debts.reduce((s,d)=>s+d.bal*(d.apr/100/12),0);
  const {needs,wants,savings}=split5030;
  const splitTotal=needs+wants+savings||1;
  const needsPct=Math.round(needs/splitTotal*100);
  const wantsPct=Math.round(wants/splitTotal*100);
  const savePct=Math.round(savings/splitTotal*100);
  const modes=[
    {id:"debt",   lbl:"Debt Free",     ico:"💳",desc:"Pay it off & spend nothing extra"},
    {id:"invest", lbl:"Invest & Grow", ico:"📈",desc:"Build wealth & hit savings goals"},
    {id:"whatif", lbl:"What If?",      ico:"🔮",desc:"Model scenarios & plan ahead"},

  return(
    <div className="fade">
      {/* Greeting */}
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:700,color:T.text,lineHeight:1.1}}>{greetText} {greetEmoji}</div>
        <div style={{fontSize:12,color:T.sub,marginTop:4}}>{MO[mo]} {yr} — {focusMode==="debt"?"Debt-free focus":focusMode==="invest"?"Investing & growth focus":"What-if scenario mode"}</div>
      </div>

      {/* Focus mode selector */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:14}}>
        {modes.map(m=>(
          <button key={m.id} onClick={()=>!isShared&&onFocus(m.id)}
            style={{padding:"11px 6px",borderRadius:14,border:`1.5px solid ${focusMode===m.id?T.a+"60":T.div}`,
              background:focusMode===m.id?`${T.a}18`:T.card,cursor:"pointer",textAlign:"center",transition:"all .2s"}}>
            <div style={{fontSize:20,marginBottom:4}}>{m.ico}</div>
            <div style={{fontSize:11,fontWeight:700,color:focusMode===m.id?T.a:T.text,marginBottom:2}}>{m.lbl}</div>
            <div style={{fontSize:9,color:T.lt,lineHeight:1.3}}>{m.desc}</div>
          </button>
        ))}
      </div>

      {/* Monthly quote */}
      <div style={{background:`linear-gradient(135deg,${T.a}14,${T.a3}0A)`,border:`1px solid ${T.a}20`,borderRadius:16,padding:"14px 17px",marginBottom:13,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-8,left:8,fontSize:60,opacity:.06,color:T.text,fontFamily:"Georgia,serif",lineHeight:1,pointerEvents:"none"}}>"</div>
        <div style={{fontSize:13,color:T.text,lineHeight:1.7,fontStyle:"italic",marginBottom:7,position:"relative"}}>{quote.q}</div>
        <div style={{fontSize:10,letterSpacing:"0.13em",textTransform:"uppercase",color:T.a,fontWeight:700}}>✦ {quote.tag}</div>
      </div>

      {/* Health score */}
      <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
        <Row style={{marginBottom:12}}>
          <SL T={T} mb={0}>Financial Health Score</SL>
          <div style={{fontSize:10,color:T.lt}}>{healthScore.grade}</div>
        </Row>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:12}}>
          <div style={{flexShrink:0,width:70,height:70,borderRadius:"50%",background:`conic-gradient(${T.a} ${healthScore.score*3.6}deg, ${T.div} 0deg)`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            <div style={{width:56,height:56,borderRadius:"50%",background:T.card,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.a}}>{healthScore.score}</div>
            </div>
          </div>
          <div style={{flex:1}}>
            {healthScore.details.map((d,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <span style={{fontSize:11}}>{d.icon}</span>
                <div style={{flex:1,height:4,background:T.div,borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(d.pts/d.max)*100}%`,background:`linear-gradient(90deg,${T.a},${T.a2})`,borderRadius:99}}/>
                </div>
                <span style={{fontSize:10,color:T.lt,width:16,textAlign:"right"}}>{d.pts}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{fontSize:11,color:T.lt,lineHeight:1.6}}>
          {healthScore.details.filter(d=>d.pts<d.max*0.6).map(d=>`${d.icon} ${d.note}`).slice(0,2).join("  ·  ")||"✓ All metrics looking solid — keep it up!"}
        </div>
      </Card>

      {/* 50/30/20 analyzer */}
      <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
        <Row style={{marginBottom:10}}>
          <SL T={T} mb={0}>50/30/20 Split</SL>
          <span style={{fontSize:10,color:T.lt}}>ideal: 50 · 30 · 20</span>
        </Row>
        <div style={{display:"flex",height:10,borderRadius:99,overflow:"hidden",marginBottom:8,gap:2}}>
          {[{v:needsPct,c:T.a,lbl:"Needs"},{v:wantsPct,c:T.a3,lbl:"Wants"},{v:savePct,c:T.a2,lbl:"Savings/Debt"}].map((s,i)=>(
            s.v>0&&<div key={i} style={{flex:s.v,background:s.c,minWidth:4,transition:"flex .5s"}}/>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
          {[
            {lbl:"Needs",v:needs,pct:needsPct,ideal:50,c:T.a},
            {lbl:"Wants",v:wants,pct:wantsPct,ideal:30,c:T.a3},
            {lbl:"Savings / Debt",v:savings,pct:savePct,ideal:20,c:T.a2},
          ].map((s,i)=>{
            const diff=s.pct-s.ideal;
            return(
              <div key={i} style={{background:`${s.c}0F`,borderRadius:10,padding:"9px 10px",border:`1px solid ${s.c}20`}}>
                <div style={{fontSize:10,color:T.lt,marginBottom:3}}>{s.lbl}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:s.c}}>{s.pct}%</div>
                <div style={{fontSize:9,color:Math.abs(diff)>10?T.danger:T.lt,marginTop:2}}>
                  ideal {s.ideal}% {diff>3?`▲${diff}`:diff<-3?`▼${Math.abs(diff)}`:` ✓`}
                </div>
              </div>
            );
          })}
        </div>
      </Card>

      {/* Focus-specific content */}
      {focusMode==="debt"&&(
        <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
          <Row style={{marginBottom:10}}>
            <SL T={T} mb={0}>💳 Debt Payoff Focus</SL>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:T.a}}>{fmt(totDebt)}</div>
              <div style={{fontSize:10,color:T.danger}}>{fmt(totInt)}/mo interest</div>
            </div>
          </Row>
          {top3debts.map(d=>{
            const m2=pmts(d.bal,d.apr,d.min);
            return(<div key={d.id} style={{marginBottom:9}}>
              <Row style={{marginBottom:2}}>
                <span style={{fontSize:13,fontWeight:600}}>{d.name}</span>
                <span style={{fontSize:10,color:d.apr>=25?T.danger:T.lt}}>{d.apr}% APR · {plbl(m2)}</span>
              </Row>
              <div style={{height:4,background:T.div,borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(d.bal/totDebt*100*3.5,100)}%`,background:d.col,borderRadius:99}}/>
              </div>
            </div>);
          })}
          <div style={{fontSize:11,color:T.lt,marginTop:8,lineHeight:1.6,padding:"10px",background:`${T.a}08`,borderRadius:10}}>
            💡 Debt-free tip: After paying the minimum on everything, put every extra dollar toward your highest APR debt (Avant at 33.1%). When it's gone, roll that payment to the next one. This is the avalanche method.
          </div>
        </Card>
      )}
      {focusMode==="invest"&&(
        <Card T={T} style={{padding:"16px 18px",marginBottom:12}}>
          <SL T={T}>📈 Investing & Growth Focus</SL>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            {[
              {lbl:"Net Worth",v:fmt(netWorth),c:netWorth>=0?T.a2:T.danger},
              {lbl:"Total Assets",v:fmt(totAssets),c:T.a2},
              {lbl:"Savings Rate",v:`${totInc>0?Math.round(cats.filter(c=>c.g==="savings").reduce((s,c)=>s+(budgets[c.id]||0),0)/totInc*100):0}%`,c:T.a},
              {lbl:"Monthly Left",v:fmt(rem),c:rem>=0?T.a2:T.danger},
            ].map((s,i)=>(
              <div key={i} style={{background:`${T.a2}0E`,borderRadius:11,padding:"10px 12px",border:`1px solid ${T.a2}20`}}>
                <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>{s.lbl}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:s.c}}>{s.v}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:11,color:T.lt,lineHeight:1.6,padding:"10px",background:`${T.a2}08`,borderRadius:10}}>
            💡 Investing tip: Aim to save 15–20% of income. Max your 401k match first (free money), then build a 3-6 month emergency fund, then invest the rest. At your income level, every 1% increase in savings rate accelerates retirement by months.
          </div>
        </Card>
      )}
      {focusMode==="whatif"&&(
        <Card T={T} style={{padding:"18px",marginBottom:12,textAlign:"center",background:`linear-gradient(135deg,${T.a3}14,${T.a}0A)`}}>
          <div style={{fontSize:40,marginBottom:8}}>🔮</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:600,color:T.text,marginBottom:6}}>What If Scenarios</div>
          <div style={{fontSize:13,color:T.sub,lineHeight:1.6,marginBottom:14}}>Tap any scenario below to jump straight into it.</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[
              {lbl:"💳 Extra debt payment",sub:"See months saved",tab:"debt"},
              {lbl:"📉 Income change",sub:"Lose a stream or add one",tab:"income"},
              {lbl:"🎁 Apply a windfall",sub:"Pick debt to crush",tab:"windfall"},
              {lbl:"📊 Income increase",sub:"Add a new stream",tab:"income"},
            ].map((s,i)=>(
              <button key={i} onClick={()=>setPage("scenarios",s.tab)}
                style={{background:`${T.a}0C`,borderRadius:10,padding:"11px 10px",border:`1px solid ${T.a}22`,cursor:"pointer",textAlign:"left",transition:"background .15s"}}>
                <div style={{fontSize:12,fontWeight:700,color:T.text,marginBottom:3}}>{s.lbl}</div>
                <div style={{fontSize:10,color:T.lt}}>{s.sub}</div>
                <div style={{fontSize:10,color:T.a,marginTop:5,fontWeight:700}}>Open → </div>
              </button>
            ))}
          </div>
        </Card>
      )}

      {/* Cash snapshot */}
      <Card T={T} style={{padding:"14px 18px",marginBottom:12}}>
        <SL T={T}>Monthly Cash Flow</SL>
        <div style={{display:"flex",marginBottom:10}}>
          {[{lbl:"Income",v:totInc,c:T.a2},{lbl:"Budgeted",v:totBud,c:T.a},{lbl:"Spent",v:totAct,c:T.a3},{lbl:"Left",v:rem,c:rem>=0?T.a2:T.danger}].map((s,i)=>(
            <div key={i} style={{flex:1,textAlign:"center",borderRight:i<3?`1px solid ${T.div}`:"none"}}>
              <div style={{fontSize:8,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>{s.lbl}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,fontWeight:700,color:s.c}}>{fmt(Math.abs(s.v))}</div>
            </div>
          ))}
        </div>
        <div style={{height:4,background:T.div,borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:pct>90?T.danger:T.a,borderRadius:99,transition:"width .5s"}}/>
        </div>
      </Card>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  BUDGET
// ════════════════════════════════════════════════════════════════
function Bud({T,cats,budgets,actuals,debts,onB,onA,onQuickAdd,onCatLbl,onCatIco,onCatRec,onCatDel,onCatAdd,totInc,totBud,totAct,irregIncome,pastIncome,effectiveIncome,onIrreg,isShared}){
  const [editMode,setEditMode]=useState(false);
  const rem=totInc-totAct;
  const [localPast,setLocalPast]=useState(pastIncome);
  const [quickVals,setQuickVals]=useState({});  // per-cat quick-add input values

  function toggleIrreg(){const on=!irregIncome;onIrreg(on,localPast);}
  function updatePast(field,val){const p={...localPast,[field]:val};setLocalPast(p);if(irregIncome)onIrreg(true,p);}
  function doQuickAdd(catId){
    const v=parseFloat(quickVals[catId])||0;
    if(!v)return;
    onQuickAdd(catId,v);
    setQuickVals(q=>({...q,[catId]:""}));
  }

  return(
    <div className="fade">
      <Row style={{marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:T.text}}>Budget Planner</div>
          <div style={{fontSize:12,color:T.sub,marginTop:2}}>{editMode?"✏️ Edit mode":"Planned vs. actual"}</div>
        </div>
        {!isShared&&<Btn T={T} onClick={()=>setEditMode(e=>!e)} accent={editMode?T.a2:T.a} style={{padding:"7px 13px",fontSize:12}}>{editMode?"✓ Done":"✏️ Edit"}</Btn>}
      </Row>

      {/* Irregular income toggle */}
      <Card T={T} style={{padding:"14px 16px",marginBottom:14,border:`1px solid ${T.a2}25`}}>
        <Row>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:T.text}}>📊 Variable Income Mode</div>
            <div style={{fontSize:11,color:T.lt,marginTop:2}}>Freelance, gig, or commission-based? Use a 3-month average.</div>
          </div>
          <button onClick={()=>!isShared&&toggleIrreg()}
            style={{width:48,height:26,borderRadius:99,background:irregIncome?T.a2:T.div,border:"none",cursor:"pointer",position:"relative",transition:"background .3s",flexShrink:0}}>
            <div style={{position:"absolute",top:3,left:irregIncome?24:3,width:20,height:20,borderRadius:"50%",background:"white",transition:"left .25s",boxShadow:"0 1px 4px rgba(0,0,0,.25)"}}/>
          </button>
        </Row>
        {irregIncome&&(
          <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
            {[{f:"m1",lbl:"3 months ago"},{f:"m2",lbl:"2 months ago"},{f:"m3",lbl:"Last month"}].map(x=>(
              <div key={x.f}>
                <div style={{fontSize:9,color:T.lt,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.1em"}}>{x.lbl}</div>
                <div style={{position:"relative"}}>
                  <span style={{position:"absolute",left:7,top:"50%",transform:"translateY(-50%)",fontSize:10,color:T.a2,fontWeight:700}}>$</span>
                  <input type="number" value={localPast[x.f]||""} onChange={e=>updatePast(x.f,e.target.value)} disabled={isShared}
                    style={{width:"100%",padding:"6px 6px 6px 17px",fontSize:13,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${T.a2}30`,borderRadius:9,background:`${T.a2}09`,color:T.text,outline:"none",boxSizing:"border-box"}}/>
                </div>
              </div>
            ))}
            {effectiveIncome&&<div style={{gridColumn:"1/-1",marginTop:6,padding:"9px 12px",background:`${T.a2}12`,borderRadius:10,border:`1px solid ${T.a2}25`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12,color:T.text,fontWeight:600}}>3-month average income</span>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:T.a2}}>{fmt(effectiveIncome)}/mo</span>
            </div>}
          </div>
        )}
      </Card>

      {!editMode&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 72px 72px 80px",gap:4,marginBottom:10,padding:"0 2px"}}>
          <div/>
          <div style={{textAlign:"center",fontSize:9,color:T.a,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>Planned</div>
          <div style={{textAlign:"center",fontSize:9,color:T.a2,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>Actual</div>
          <div style={{textAlign:"center",fontSize:9,color:T.a3,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>+ Add Spend</div>
        </div>
      )}

      {Object.entries(GRP).map(([gid,g])=>{
        const gc=cats.filter(c=>c.g===gid);
        if(!gc.length&&!editMode)return null;
        const gb=gc.reduce((s,c)=>s+(budgets[c.id]||0),0);
        const ga=gc.reduce((s,c)=>s+(actuals[c.id]||0),0);
        const gO=!gc.some(c=>c.inc)&&ga>gb&&gb>0;
        return(
          <div key={gid} style={{marginBottom:14}}>
            <Row style={{padding:"7px 11px",background:`${g.col}18`,borderRadius:11,border:`1px solid ${g.col}22`,marginBottom:7}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:13}}>{g.ico}</span>
                <span style={{fontSize:13,fontWeight:700,color:T.text}}>{g.lbl}</span>
                {gid==="debt"&&!editMode&&<span style={{fontSize:9,color:T.a,background:`${T.a}14`,borderRadius:4,padding:"1px 5px"}}>⇄ Synced with Debts tab</span>}
              </div>
              {!editMode&&<div style={{display:"flex",gap:12}}>
                <span style={{fontSize:12,fontWeight:700,color:T.a}}>{fmt(gb)}</span>
                <span style={{fontSize:12,fontWeight:700,color:gO?T.danger:T.a2}}>{fmt(ga)}</span>
              </div>}
            </Row>
            {gc.map(cat=>{
              const bv=budgets[cat.id]||0,av=actuals[cat.id]||0,ov=!cat.inc&&av>bv&&bv>0;
              // Check if this budget category is linked to a debt
              const linkedDebt=debts?.find(d=>d.catId===cat.id);
              if(editMode)return(
                <div key={cat.id} style={{display:"flex",gap:5,alignItems:"center",marginBottom:5,background:T.card,borderRadius:11,padding:"7px 9px",border:`1px solid ${T.border}`}}>
                  <input value={cat.ico} onChange={e=>onCatIco(cat.id,e.target.value)} style={{width:30,textAlign:"center",fontSize:14,border:`1.5px solid ${T.a}22`,borderRadius:7,padding:"3px 1px",background:`${T.a}08`,outline:"none",color:T.text,flexShrink:0}}/>
                  <input value={cat.lbl} onChange={e=>onCatLbl(cat.id,e.target.value)} style={{flex:1,fontSize:12,border:`1.5px solid ${T.a}20`,borderRadius:7,padding:"5px 7px",background:`${T.a}05`,color:T.text,outline:"none"}}/>
                  <div style={{position:"relative",width:70}}>
                    <span style={{position:"absolute",left:5,top:"50%",transform:"translateY(-50%)",fontSize:9,color:T.a,fontWeight:700}}>$</span>
                    <input type="number" value={budgets[cat.id]||""} onChange={e=>onB(cat.id,e.target.value)} style={{width:"100%",padding:"5px 4px 5px 13px",fontSize:12,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${T.a}28`,borderRadius:7,background:`${T.a}0C`,color:T.text,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <button onClick={()=>onCatRec(cat.id)} title={cat.rec?"Recurring":"Not recurring"} style={{width:24,height:24,borderRadius:"50%",border:`1.5px solid ${cat.rec?T.a2:T.lt}40`,background:cat.rec?`${T.a2}18`:"transparent",color:cat.rec?T.a2:T.lt,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>↻</button>
                  <button onClick={()=>onCatDel(cat.id)} style={{width:24,height:24,borderRadius:"50%",border:`1.5px solid ${T.danger}30`,background:`${T.danger}08`,color:T.danger,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>×</button>
                </div>
              );
              return(
                <div key={cat.id} style={{display:"grid",gridTemplateColumns:"1fr 72px 72px 80px",gap:4,alignItems:"center",marginBottom:4,background:T.card,borderRadius:11,padding:"6px 8px",border:`1px solid ${T.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,overflow:"hidden"}}>
                    <span style={{fontSize:12,flexShrink:0}}>{cat.ico}</span>
                    <span style={{fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:T.text}}>{cat.lbl}</span>
                    {cat.rec&&<span style={{fontSize:9,color:T.a2,flexShrink:0}}>↻</span>}
                    {linkedDebt&&<span title={`Synced with Debts tab — ${fmt(linkedDebt.bal)} remaining`} style={{fontSize:8,color:T.a,background:`${T.a}15`,borderRadius:4,padding:"1px 4px",flexShrink:0,letterSpacing:"0.04em"}}>⇄</span>}
                  </div>
                  {/* Planned */}
                  <div style={{position:"relative"}}>
                    <span style={{position:"absolute",left:5,top:"50%",transform:"translateY(-50%)",fontSize:9,color:T.a,fontWeight:700,pointerEvents:"none"}}>$</span>
                    <input type="number" value={budgets[cat.id]||""} onChange={e=>onB(cat.id,e.target.value)} disabled={isShared}
                      style={{width:"100%",padding:"5px 2px 5px 13px",fontSize:12,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${T.a}30`,borderRadius:8,background:`${T.a}09`,color:T.text,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  {/* Actual total */}
                  <div style={{position:"relative"}}>
                    <span style={{position:"absolute",left:5,top:"50%",transform:"translateY(-50%)",fontSize:9,color:ov?T.danger:T.a2,fontWeight:700,pointerEvents:"none"}}>$</span>
                    <input type="number" value={actuals[cat.id]||""} onChange={e=>onA(cat.id,e.target.value)} disabled={isShared}
                      style={{width:"100%",padding:"5px 2px 5px 13px",fontSize:12,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${ov?T.danger:T.a2}30`,borderRadius:8,background:ov?`${T.danger}08`:`${T.a2}09`,color:ov?T.danger:T.text,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  {/* Quick-add spend — income rows don't need this */}
                  {!cat.inc?(
                    <div style={{display:"flex",gap:2,alignItems:"center"}}>
                      <div style={{position:"relative",flex:1}}>
                        <span style={{position:"absolute",left:4,top:"50%",transform:"translateY(-50%)",fontSize:9,color:T.a3,fontWeight:700,pointerEvents:"none"}}>$</span>
                        <input type="number" placeholder="0"
                          value={quickVals[cat.id]||""}
                          onChange={e=>setQuickVals(q=>({...q,[cat.id]:e.target.value}))}
                          onKeyDown={e=>e.key==="Enter"&&doQuickAdd(cat.id)}
                          disabled={isShared}
                          style={{width:"100%",padding:"5px 2px 5px 12px",fontSize:11,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,border:`1.5px solid ${T.a3}28`,borderRadius:8,background:`${T.a3}08`,color:T.text,outline:"none",boxSizing:"border-box"}}/>
                      </div>
                      <button onClick={()=>doQuickAdd(cat.id)} disabled={isShared||!quickVals[cat.id]}
                        style={{width:20,height:20,borderRadius:"50%",border:`1.5px solid ${T.a3}50`,background:quickVals[cat.id]?`${T.a3}20`:"transparent",color:T.a3,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:quickVals[cat.id]?1:0.3,fontWeight:700,lineHeight:1}}>+</button>
                    </div>
                  ):<div/>}
                </div>
              );
            })}
            {editMode&&<button onClick={()=>onCatAdd(gid)} style={{width:"100%",padding:"6px",borderRadius:10,background:"transparent",border:`1.5px dashed ${g.col}55`,fontSize:12,color:g.col,fontWeight:600,cursor:"pointer",marginTop:2}}>+ Add to {g.lbl}</button>}
          </div>
        );
      })}
      {editMode&&<div style={{background:`${T.a2}10`,border:`1px solid ${T.a2}25`,borderRadius:14,padding:"11px 14px",marginBottom:14,fontSize:12,color:T.sub,lineHeight:1.7}}>💡 <strong>↻</strong> = auto-fills actual at the start of each month. Tap <strong>✓ Done</strong> when finished.</div>}
      {!editMode&&<Card T={T} style={{padding:"13px 17px",marginBottom:20}}>
        {/* Main rows */}
        {[
          {lbl:"Total Income",      v:totInc, c:T.a2},
          {lbl:"Total Budgeted",    v:totBud, c:T.a},
          {lbl:"Total Spent",       v:totAct, c:totAct>totInc?T.danger:T.a3},
        ].map((s,i)=>(
          <Row key={i} style={{marginBottom:7}}>
            <span style={{fontSize:13,fontWeight:600}}>{s.lbl}</span>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:s.c}}>{fmt(s.v)}</span>
          </Row>
        ))}
        <div style={{borderTop:`1px solid ${T.div}`,marginTop:4,paddingTop:10}}>
          {/* Remaining Planned — income minus budgeted */}
          {(()=>{
            const remPlan=totInc-totBud;
            const over=remPlan<0;
            return(
              <Row style={{marginBottom:8}}>
                <div>
                  <span style={{fontSize:13,fontWeight:700}}>Remaining Planned</span>
                  <div style={{fontSize:10,color:T.lt,marginTop:1}}>Income − budgeted</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:over?T.danger:T.a2}}>{fmt(Math.abs(remPlan))}</span>
                  <div style={{fontSize:10,color:over?T.danger:T.lt,marginTop:1}}>{over?"⚠ over-budgeted":"unallocated"}</div>
                </div>
              </Row>
            );
          })()}
          {/* Remaining Actual — income minus spent */}
          {(()=>{
            const remAct=totInc-totAct;
            const over=remAct<0;
            return(
              <Row>
                <div>
                  <span style={{fontSize:13,fontWeight:700}}>Remaining Actual</span>
                  <div style={{fontSize:10,color:T.lt,marginTop:1}}>Income − spent</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:over?T.danger:T.a2}}>{fmt(Math.abs(remAct))}</span>
                  <div style={{fontSize:10,color:over?T.danger:T.lt,marginTop:1}}>{over?"⚠ over spent":"left to spend"}</div>
                </div>
              </Row>
            );
          })()}
        </div>
        {/* Progress bar showing actual vs planned */}
        {(totBud>0||totAct>0)&&(
          <div style={{marginTop:12}}>
            <div style={{height:5,background:T.div,borderRadius:99,overflow:"hidden",marginBottom:4}}>
              <div style={{height:"100%",width:`${Math.min(totAct/Math.max(totBud,totInc,1)*100,100)}%`,background:totAct>totBud?T.danger:T.a2,borderRadius:99,transition:"width .5s"}}/>
            </div>
            <Row style={{fontSize:10,color:T.lt}}>
              <span>Spent {totBud>0?Math.round(totAct/totBud*100):0}% of budget</span>
              <span>{totInc>0?Math.round(totAct/totInc*100):0}% of income</span>
            </Row>
          </div>
        )}
      </Card>}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  DEBTS
// ════════════════════════════════════════════════════════════════
function Dbt({T,debts,dpays,onDE,onDD,onPay,onDelPay,newPay,setNewPay,editD,setEditD,showAddD,setShowAddD,ndf,setNdf,onAddDebt,totDebt,isShared}){
  const totInt=useMemo(()=>debts.reduce((s,d)=>s+d.bal*(d.apr/100/12),0),[debts]);
  const sorted=useMemo(()=>[...debts].sort((a,b)=>a.ord-b.ord),[debts]);
  return(
    <div className="fade">
      <Row style={{marginBottom:14}}>
        <div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:T.text}}>Debt Tracker</div>
        <div style={{fontSize:12,color:T.sub,marginTop:2}}>Track, pay, eliminate</div></div>
        <div style={{textAlign:"right"}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:700,color:T.a}}>{fmt(totDebt)}</div>
          <div style={{fontSize:10,color:T.danger}}>{fmt(totInt)}/mo interest</div>
        </div>
      </Row>
      {!isShared&&<>
        <Card T={T} style={{padding:"14px 16px",marginBottom:11}}>
          <SL T={T}>Log a Payment</SL>
          <select value={newPay.did} onChange={e=>setNewPay(p=>({...p,did:e.target.value}))} style={{width:"100%",padding:"8px 11px",borderRadius:10,border:`1.5px solid ${T.a}35`,background:T.card,color:T.text,fontSize:13,marginBottom:7,outline:"none",colorScheme:T.dark?"dark":"light"}}>
            <option value="">Select debt…</option>
            {sorted.map(d=><option key={d.id} value={d.id}>{d.name} — {fmt(d.bal)}</option>)}
          </select>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:7}}>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:11,color:T.a,fontWeight:700}}>$</span>
              <input type="number" placeholder="Amount" value={newPay.amt} onChange={e=>setNewPay(p=>({...p,amt:e.target.value}))} style={{width:"100%",padding:"7px 7px 7px 19px",borderRadius:10,border:`1.5px solid ${T.a}28`,background:`${T.a}08`,fontSize:13,color:T.text,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <input type="text" placeholder="Note" value={newPay.note} onChange={e=>setNewPay(p=>({...p,note:e.target.value}))} style={{padding:"7px 10px",borderRadius:10,border:`1.5px solid ${T.a}28`,background:`${T.a}08`,fontSize:13,color:T.text,outline:"none"}}/>
            <input type="date" value={newPay.date?newPay.date.split("T")[0]:""} onChange={e=>setNewPay(p=>({...p,date:e.target.value}))} style={{padding:"7px 8px",borderRadius:10,border:`1.5px solid ${T.a}28`,background:T.card,fontSize:12,color:T.text,outline:"none",colorScheme:T.dark?"dark":"light"}}/>          </div>
          <Btn T={T} full onClick={onPay}>+ Log Payment (updates balance)</Btn>
        </Card>
        <button onClick={()=>setShowAddD(!showAddD)} style={{width:"100%",padding:"9px",borderRadius:12,background:showAddD?`${T.a2}12`:T.card,border:`1.5px dashed ${T.a2}45`,fontSize:12,fontWeight:700,color:T.a2,cursor:"pointer",marginBottom:11}}>{showAddD?"✕ Cancel":"+ Add New Debt"}</button>
        {showAddD&&<Card T={T} style={{padding:"13px 14px",marginBottom:11}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
            <input placeholder="Debt name" value={ndf.name} onChange={e=>setNdf(f=>({...f,name:e.target.value}))} style={{gridColumn:"1/-1",padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.a}28`,background:`${T.a}08`,fontSize:13,color:T.text,outline:"none"}}/>
            {[{p:"Balance ($)",k:"bal"},{p:"APR (%)",k:"apr"},{p:"Min Payment ($)",k:"min"}].map(f=>(
              <input key={f.k} type="number" placeholder={f.p} value={ndf[f.k]} onChange={e=>setNdf(x=>({...x,[f.k]:e.target.value}))} style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.a}28`,background:`${T.a}08`,fontSize:13,color:T.text,outline:"none"}}/>
            ))}
          </div>
          <Btn T={T} full onClick={onAddDebt} accent={T.a2}>Add Debt</Btn>
        </Card>}
      </>}
      {sorted.map(d=>{
        const pays=dpays[d.id]||[],paid=pays.reduce((s,p)=>s+p.amt,0);
        const effPay=paid||d.min,m2=pmts(d.bal,d.apr,effPay),mi=d.bal*(d.apr/100/12);
        const principal=Math.max(0,paid-mi),isE=editD===d.id;
        return(
          <div key={d.id} style={{background:T.card,backdropFilter:"blur(12px)",borderRadius:18,padding:"14px",border:`1.5px solid ${d.col}28`,marginBottom:10,boxShadow:`0 2px 12px rgba(0,0,0,${T.dark?.08:.05})`}}>
            <Row style={{marginBottom:9}}>
              <div><div style={{fontSize:15,fontWeight:700,color:T.text}}>{d.name}</div>
              <div style={{fontSize:11,color:d.apr>=25?T.danger:T.lt,marginTop:1}}>{d.apr>0?`${d.apr}% APR`:"0% APR"} · Min: {fmt(d.min)}/mo</div></div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:700,color:d.col}}>{fmt(d.bal)}</div>
                {!isShared&&<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:1}}>
                  <button onClick={()=>setEditD(isE?null:d.id)} style={{fontSize:10,color:T.lt,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>{isE?"Done":"Edit"}</button>
                  <button onClick={()=>onDD(d.id)} style={{fontSize:10,color:T.danger,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Delete</button>
                </div>}
              </div>
            </Row>
            {isE&&<div style={{background:`${d.col}0E`,borderRadius:11,padding:"10px",marginBottom:10,border:`1px solid ${d.col}20`}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                {[{lbl:"Balance",k:"bal"},{lbl:"APR %",k:"apr"},{lbl:"Min Pay",k:"min"}].map(f=>(
                  <div key={f.k}><div style={{fontSize:9,color:T.lt,marginBottom:2}}>{f.lbl}</div>
                  <input type="number" step={f.k==="apr"?"0.1":"1"} value={d[f.k]} onChange={e=>onDE({...d,[f.k]:parseFloat(e.target.value)||0})}
                    style={{width:"100%",padding:"6px 8px",borderRadius:7,border:`1.5px solid ${d.col}35`,background:T.card,color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
                ))}
              </div>
            </div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:9}}>
              {[
                {lbl:"This Month",v:paid>0?fmt(paid):"—",sub:paid>0?`${pays.length} payment${pays.length!==1?"s":""}`:d.min>0?`Min: ${fmt(d.min)}`:"No min set",c:paid>0?d.col:T.lt},
                {lbl:"Payoff Est.",v:plbl(m2),sub:isFinite(m2)?`${m2} mo at ${fmt(effPay)}/mo`:"⚠ increase payment",c:T.text},
                {lbl:"Interest/Mo",v:fmt(mi),sub:d.apr>0?`${d.apr}% APR`:"No interest",c:d.apr>=25?T.danger:T.lt},
              ].map((s,i)=>(
                <div key={i} style={{background:`${d.col}0F`,borderRadius:9,padding:"8px 9px",border:`1px solid ${d.col}18`}}>
                  <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>{s.lbl}</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:i===1?11:14,fontWeight:700,color:s.c,lineHeight:1.2}}>{s.v}</div>
                  <div style={{fontSize:9,color:T.lt,marginTop:2}}>{s.sub}</div>
                </div>
              ))}
            </div>
            {/* Principal vs interest bar — show estimate if no payments yet */}
            {(()=>{
              const showPaid=paid>0;
              const barPrincipal=showPaid?Math.max(0,paid-mi):Math.max(0,d.min-mi);
              const barTotal=showPaid?paid:d.min||1;
              const barPct=barTotal>0?Math.min(barPrincipal/barTotal*100,100):0;
              return(
                <div style={{marginBottom:pays.length?8:0}}>
                  <div style={{height:4,background:T.div,borderRadius:99,overflow:"hidden",marginBottom:2}}>
                    <div style={{height:"100%",width:`${barPct}%`,background:T.a2,borderRadius:99}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:T.lt}}>
                    {showPaid
                      ?<><span style={{color:T.a2}}>Principal: {fmt(barPrincipal)}</span><span style={{color:T.danger}}>Interest: {fmt(Math.min(mi,paid))}</span></>
                      :<><span style={{color:T.a2}}>Est. principal: {fmt(barPrincipal)}</span><span style={{color:T.danger}}>Est. interest: {fmt(mi)}</span></>
                    }
                  </div>
                </div>
              );
            })()}
            {pays.length>0&&<div style={{borderTop:`1px solid ${d.col}18`,paddingTop:7}}>
              <div style={{fontSize:10,color:T.lt,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.1em"}}>Payments This Month</div>
              {pays.map((p,i)=>(
                <Row key={i} style={{fontSize:12,marginBottom:3,alignItems:"center"}}>
                  <span style={{color:T.lt,flex:1}}>{p.note||new Date(p.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                  <span style={{fontWeight:700,color:T.a2,marginRight:8}}>{fmt(p.amt)}</span>
                  {!isShared&&(
                    <button
                      onClick={()=>{if(confirm(`Remove this ${fmt(p.amt)} payment? The balance and budget will be restored.`))onDelPay(d.id,i);}}
                      title="Remove this payment"
                      style={{width:18,height:18,borderRadius:"50%",border:`1px solid ${T.danger}40`,background:`${T.danger}0C`,color:T.danger,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,lineHeight:1}}>
                      ×
                    </button>
                  )}
                </Row>
              ))}
              <Row style={{borderTop:`1px solid ${d.col}12`,paddingTop:5,marginTop:3}}>
                <span style={{fontSize:12,fontWeight:700}}>Total Paid</span>
                <span style={{fontSize:12,fontWeight:700,color:T.a2}}>{fmt(paid)}</span>
              </Row>
            </div>}
          </div>
        );
      })}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  GOALS  (rebuilt)
// ════════════════════════════════════════════════════════════════
function Goals({T,goals,goalPays,onGoalEdit,onGoalDel,onGoalAdd,onGoalPay,assets,onAssetVal,onAssetName,onAssetUpdate,onAddAsset,onDelAsset,totDebt,totAssets,netWorth,nwHist,saveNwSnap,isShared}){
  const [showAddG,setShowAddG]=useState(false);
  const [editG,setEditG]=useState(null);
  const [showContrib,setShowContrib]=useState(null);
  const [ng,setNg]=useState({name:"",ico:"🎯",target:"",saved:"",monthly:"",col:"#B5C9B8",targetDate:""});
  const [contrib,setContrib]=useState({amt:"",note:"",date:""});
  const [showAssetPicker,setShowAssetPicker]=useState(false);
  const [zState,setZState]=useState({});
  const nwPos=netWorth>=0;

  async function doZillow(id,address){
    if(!address?.trim())return;
    setZState(s=>({...s,[id]:{status:"loading"}}));
    const val=await fetchZillow(address);
    setZState(s=>({...s,[id]:val?{status:"found",value:val}:{status:"failed"}}));
  }

  function addGoal(){
    if(!ng.name||!ng.target)return;
    onGoalAdd({id:"g"+Date.now(),name:ng.name,ico:ng.ico,target:parseFloat(ng.target)||0,saved:parseFloat(ng.saved)||0,monthly:parseFloat(ng.monthly)||0,col:ng.col,targetDate:ng.targetDate});
    setNg({name:"",ico:"🎯",target:"",saved:"",monthly:"",col:"#B5C9B8",targetDate:""});setShowAddG(false);
  }
  function logContrib(gid){
    if(!contrib.amt)return;
    onGoalPay(gid,parseFloat(contrib.amt)||0,contrib.note,contrib.date);
    setContrib({amt:"",note:"",date:""});setShowContrib(null);
  }

  // Calculate monthly needed to hit target by date
  function moNeeded(target,saved,targetDate){
    if(!targetDate||saved>=target)return null;
    const d=new Date(targetDate),n=new Date();
    const months=(d.getFullYear()-n.getFullYear())*12+(d.getMonth()-n.getMonth());
    if(months<=0)return null;
    return Math.ceil((target-saved)/months);
  }

  return(
    <div className="fade">
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:T.text}}>Goals & Net Worth</div>
        <div style={{fontSize:12,color:T.sub,marginTop:2}}>Save intentionally. Track your wealth.</div>
      </div>

      {/* Savings Goals section */}
      <Row style={{marginBottom:10}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:T.text}}>⭐ Savings Goals</div>
        {!isShared&&<Btn T={T} onClick={()=>setShowAddG(!showAddG)} accent={T.a2} style={{padding:"6px 12px",fontSize:12}}>{showAddG?"✕ Cancel":"+ New Goal"}</Btn>}
      </Row>

      {showAddG&&<Card T={T} style={{padding:"14px 16px",marginBottom:13}}>
        <div style={{display:"grid",gridTemplateColumns:"38px 1fr",gap:7,marginBottom:7}}>
          <input value={ng.ico} onChange={e=>setNg(g=>({...g,ico:e.target.value}))} style={{textAlign:"center",fontSize:17,border:`1.5px solid ${T.a2}28`,borderRadius:8,padding:"5px 2px",background:`${T.a2}08`,outline:"none",color:T.text}}/>
          <input placeholder="Goal name (e.g. Germany Trip, Emergency Fund)" value={ng.name} onChange={e=>setNg(g=>({...g,name:e.target.value}))} style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.a2}28`,background:`${T.a2}08`,fontSize:13,color:T.text,outline:"none"}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
          {[{p:"Target Amount ($)",k:"target"},{p:"Already Saved ($)",k:"saved"},{p:"Monthly Contribution ($)",k:"monthly"}].map(f=>(
            <input key={f.k} type="number" placeholder={f.p} value={ng[f.k]} onChange={e=>setNg(g=>({...g,[f.k]:e.target.value}))} style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.a2}28`,background:`${T.a2}08`,fontSize:13,color:T.text,outline:"none"}}/>
          ))}
          <div>
            <div style={{fontSize:9,color:T.lt,marginBottom:3}}>Target Date</div>
            <input type="date" value={ng.targetDate} onChange={e=>setNg(g=>({...g,targetDate:e.target.value}))} style={{width:"100%",padding:"7px 10px",borderRadius:9,border:`1.5px solid ${T.a2}28`,background:T.card,fontSize:12,color:T.text,outline:"none",boxSizing:"border-box",colorScheme:T.dark?"dark":"light"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
          {GOAL_COLS.map(c=><button key={c} onClick={()=>setNg(g=>({...g,col:c}))} style={{width:22,height:22,borderRadius:"50%",background:c,border:ng.col===c?`2.5px solid ${T.text}`:"2px solid transparent",cursor:"pointer",flexShrink:0}}/>)}
        </div>
        <Btn T={T} full onClick={addGoal} accent={T.a2}>Add Goal</Btn>
      </Card>}

      {goals.length===0&&!showAddG&&<Card T={T} style={{padding:"24px 20px",marginBottom:13,textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:8}}>⭐</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:T.text,marginBottom:4}}>No goals yet</div>
        <div style={{fontSize:12,color:T.lt}}>Add your first savings goal — vacation, emergency fund, new car, anything.</div>
      </Card>}

      {goals.map(g=>{
        const pct=g.target>0?Math.min(100,Math.round(g.saved/g.target*100)):0;
        const rem=Math.max(0,g.target-g.saved);
        const mo2=g.monthly>0?Math.ceil(rem/g.monthly):Infinity;
        const est=isFinite(mo2)?new Date(Date.now()+mo2*30.4*86400000).toLocaleDateString("en-US",{month:"short",year:"numeric"}):"—";
        const isEG=editG===g.id;
        const isShowC=showContrib===g.id;
        const needed=moNeeded(g.target,g.saved,g.targetDate);
        const pays=goalPays[g.id]||[];
        const paidThisMo=pays.reduce((s,p)=>s+p.amt,0);
        const done=g.saved>=g.target;

        return(
          <div key={g.id} className={done?"celebrate":""} style={{background:T.card,backdropFilter:"blur(12px)",borderRadius:18,padding:"15px",border:`1.5px solid ${done?T.a2+"60":g.col+"30"}`,marginBottom:12,boxShadow:`0 2px 12px rgba(0,0,0,${T.dark?.08:.05})`,transition:"border-color .3s"}}>
            {done&&<div style={{background:`${T.a2}18`,border:`1px solid ${T.a2}30`,borderRadius:10,padding:"8px 12px",marginBottom:10,textAlign:"center",fontSize:13,color:T.a2,fontWeight:700}}>🎉 Goal reached! You did it!</div>}
            <Row style={{marginBottom:11}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:22}}>{g.ico}</span>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:T.text}}>{g.name}</div>
                  <div style={{fontSize:11,color:T.lt,marginTop:1}}>Target {fmt(g.target)} · {fmt(g.monthly)}/mo</div>
                </div>
              </div>
              {!isShared&&<div style={{display:"flex",gap:7}}>
                <button onClick={()=>setEditG(isEG?null:g.id)} style={{fontSize:10,color:T.lt,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>{isEG?"Done":"Edit"}</button>
                <button onClick={()=>onGoalDel(g.id)} style={{fontSize:10,color:T.danger,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Delete</button>
              </div>}
            </Row>

            {isEG&&<div style={{background:`${g.col}0E`,borderRadius:11,padding:"11px",marginBottom:11,border:`1px solid ${g.col}20`}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                {[{lbl:"Name",k:"name",t:"text"},{lbl:"Target ($)",k:"target",t:"number"},{lbl:"Saved ($)",k:"saved",t:"number"},{lbl:"Monthly ($)",k:"monthly",t:"number"}].map(f=>(
                  <div key={f.k}><div style={{fontSize:9,color:T.lt,marginBottom:2}}>{f.lbl}</div>
                  <input type={f.t} value={g[f.k]} onChange={e=>onGoalEdit({...g,[f.k]:f.t==="number"?parseFloat(e.target.value)||0:e.target.value})}
                    style={{width:"100%",padding:"6px 8px",borderRadius:7,border:`1.5px solid ${g.col}35`,background:T.card,color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
                ))}

                <input type="date" value={g.targetDate||""} onChange={e=>onGoalEdit({...g,targetDate:e.target.value})}
                  style={{width:"100%",padding:"6px 8px",borderRadius:7,border:`1.5px solid ${g.col}35`,background:T.card,color:T.text,fontSize:12,outline:"none",boxSizing:"border-box",colorScheme:T.dark?"dark":"light"}}/></div>
              </div>

            {/* Progress bar */}
            <div style={{marginBottom:10}}>
              <Row style={{fontSize:12,marginBottom:5}}>
                <span style={{color:T.text,fontWeight:700}}>{fmt(g.saved)} saved</span>

              </Row>
              <div style={{height:9,background:T.div,borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${g.col},${g.col}CC)`,borderRadius:99,transition:"width .6s cubic-bezier(.4,0,.2,1)"}}/>
              </div>
              <Row style={{fontSize:11,color:T.lt,marginTop:3}}>
                <span>{fmt(rem)} remaining</span>

              </Row>

            {/* Stats */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:10}}>
              {[
                {lbl:"Est. Done",v:est,sub:isFinite(mo2)?`${mo2} months away`:"Set monthly contribution",c:T.text},
                {lbl:"Need/Month",v:needed?fmt(needed):"On track",sub:needed&&g.monthly?`budgeted ${fmt(g.monthly)}`:`to hit ${g.targetDate?"date":"goal"}`,c:needed&&g.monthly&&needed>g.monthly?T.danger:T.a2},
                {lbl:"This Month",v:fmt(paidThisMo),sub:`${pays.length} contribution${pays.length!==1?"s":""}`,c:g.col},

                      <span style={{position:"absolute",left:7,top:"50%",transform:"translateY(-50%)",fontSize:10,color:T.a2,fontWeight:700}}>$</span>

            {/* Contribution history */}
            {pays.length>0&&<div style={{borderTop:`1px solid ${g.col}18`,paddingTop:7,marginTop:8}}>
              <div style={{fontSize:10,color:T.lt,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.1em"}}>Contributions This Month</div>
              {pays.map((p,i)=>(
                <Row key={i} style={{fontSize:12,marginBottom:3}}>
                  <span style={{color:T.lt}}>{p.note||new Date(p.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                  <span style={{fontWeight:700,color:T.a2}}>+{fmt(p.amt)}</span>
